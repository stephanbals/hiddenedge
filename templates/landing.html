<!DOCTYPE html>
<html>
<head>
    <title>HiddenEdge</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: black;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 800px;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            color: #ccc;
        }

        .robots {
            margin: 30px 0;
        }

        .robots img {
            height: 120px;
            margin: 10px;
        }

        button {
            padding: 15px 25px;
            font-size: 18px;
            background: #1f6feb;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Know if you should apply — before recruiters reject you</h1>

    <p>HiddenEdge simulates how recruiters and hiring managers evaluate your CV</p>

    <div class="robots">
        <img src="/static/nestor.png">
        <img src="/static/alec.png">
        <img src="/static/helper.png">
    </div>

    <p>
        Nestor evaluates your fit<br>
        Alec improves your CV<br>
        Helper guides you
    </p>

    <button onclick="start()">Click here to start</button>

</div>

<script>
function start() {
    window.location.href = "/eula";
}
</script>

</body>
</html>
