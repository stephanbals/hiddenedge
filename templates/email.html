<!DOCTYPE html>
<html>
<head>
<title>Email - HiddenEdge</title>
<link rel="icon" href="/static/favicon.ico">

<style>
body {
    margin:0;
    background:black;
    color:white;
    text-align:center;
    font-family:Arial;
}

/* LOGO */
.logo {
    position:fixed;
    top:15px;
    left:20px;
    color:#9fd3ff;
    font-weight:bold;
}

/* 🌌 BACKGROUND */
body::before {
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background:
        radial-gradient(circle, rgba(255,255,255,0.5), transparent 40%),
        radial-gradient(circle at 30% 60%, rgba(0,150,255,0.5), transparent 60%),
        radial-gradient(circle at 70% 40%, rgba(200,100,255,0.5), transparent 60%);
    transform:rotate(-20deg);
    filter:blur(70px);
    z-index:-2;
}

/* ✨ STARS */
body::after {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background-image:
        radial-gradient(3px 3px at 20% 30%, white, transparent),
        radial-gradient(2px 2px at 70% 60%, white, transparent),
        radial-gradient(3px 3px at 40% 80%, white, transparent);
    animation:twinkle 1.5s infinite alternate;
    z-index:-1;
}

@keyframes twinkle {
    from {opacity:0.3;}
    to {opacity:1;}
}

/* CONTENT */
.container {
    margin-top:140px;
}

input {
    padding:10px;
    width:260px;
    border-radius:5px;
    border:none;
}

button {
    padding:12px 25px;
    background:#4da6ff;
    border:none;
    cursor:pointer;
    margin-top:20px;
    font-size:16px;
}

.helper-text {
    margin-top:10px;
    font-size:14px;
    color:#bbb;
}
</style>
</head>

<body>

<div class="logo">HiddenEdge</div>

<div class="container">

<h2>Enter your email to continue</h2>

<input type="email" id="email" placeholder="you@example.com">

<div class="helper-text">
We use your email to track your analysis and unlock premium features
</div>

<button onclick="go()">Continue</button>

</div>

<script>

function isValidEmail(email) {
    const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    return regex.test(email);
}

function go() {
    const email = document.getElementById("email").value.trim();

    if (!email) {
        alert("Please enter your email");
        return;
    }

    if (!isValidEmail(email)) {
        alert("Please enter a valid email address");
        return;
    }

    localStorage.setItem("email", email);

    window.location.href = "/app";
}

</script>

</body>
</html>
