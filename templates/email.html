<!DOCTYPE html>
<html>
<head>
    <title>HiddenEdge – Email</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0b1220, #132a4a);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .card {
            background: #121826;
            padding: 30px;
            border-radius: 14px;
            width: 420px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0,0,0,0.4);
        }

        input {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            border-radius: 10px;
            border: none;
            background: #0b1220;
            color: white;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            background: linear-gradient(135deg, #4facfe, #6a82fb);
            color: white;
            cursor: pointer;
        }

        img {
            width: 80px;
            margin-bottom: 10px;
        }
    </style>

    <script>
        async function submitEmail() {
            const email = document.getElementById("email").value;

            const res = await fetch("/submit-email", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ email })
            });

            const data = await res.json();

            if (data.success) {
                window.location.href = data.redirect;
            } else {
                alert("Something went wrong");
            }
        }
    </script>

</head>

<body>

<div class="card">
    <img src="/static/robots/nestor.png">
    <h2>Enter your email</h2>
    <p>We’ll use this to personalize your experience.</p>

    <input id="email" type="email" placeholder="your@email.com">

    <button onclick="submitEmail()">Continue</button>
</div>

</body>
</html>
