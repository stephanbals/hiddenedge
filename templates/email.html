<!DOCTYPE html>
<html>
<head>
    <title>HiddenEdge - Continue</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: black;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .box {
            text-align: center;
            max-width: 500px;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }

        button {
            margin-top: 20px;
            padding: 12px 20px;
            background: #1f6feb;
            color: white;
            border: none;
            cursor: pointer;
        }

        p {
            color: #aaa;
            font-size: 14px;
        }

        .contact {
            margin-top: 25px;
            font-size: 13px;
            color: #777;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>Enter your email to continue</h2>

    <p>
        HiddenEdge will use this to track your analysis session.
    </p>

    <input type="email" id="email" placeholder="you@email.com">

    <button onclick="continueFlow()">Continue</button>

    <div class="contact">
        HiddenEdgeInfo@proton.me
    </div>

</div>

<script>
function continueFlow() {

    let email = document.getElementById("email").value;

    if (!email || !email.includes("@")) {
        alert("Enter a valid email");
        return;
    }

    // store email locally
    localStorage.setItem("hiddenedge_email", email);

    // initialize free usage counter if not exists
    if (!localStorage.getItem("hiddenedge_uses")) {
        localStorage.setItem("hiddenedge_uses", "0");
    }

    window.location.href = "/app";
}
</script>

</body>
</html>
