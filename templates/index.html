<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HiddenEdge</title>
<link rel="icon" href="/static/favicon.ico">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0f2a;
    color: white;
    text-align: center;
}

.screen { display:none; padding:40px; min-height:100vh; position:relative; }
.active { display:block; }

input, textarea {
    width:500px; max-width:90%; margin:10px; padding:10px;
}

button {
    padding:10px 20px; margin:10px;
    background:#4da6ff; border:none; cursor:pointer;
}

#result {
    margin-top:30px; max-width:900px;
    margin-left:auto; margin-right:auto;
    text-align:left;
}

.footer {
    position:absolute; bottom:10px; width:100%;
    font-size:12px; color:#aaa;
}

.help-btn { position:absolute; top:20px; right:20px; }

.modal {
    display:none; position:fixed; z-index:2000;
    width:100%; height:100%; background:rgba(0,0,0,0.7);
}

.modal-content {
    background:#1a1f3d; margin:8% auto; padding:20px;
    width:600px; border-radius:10px; position:relative;
}

.close-btn {
    position:absolute; top:10px; right:15px; cursor:pointer;
}

table { width:100%; border-collapse:collapse; }
td, th { border:1px solid #444; padding:8px; }
</style>
</head>

<body>

<button class="help-btn" onclick="openHelp()">Help</button>

<div id="landing" class="screen active">
    <h1>HiddenEdge</h1>
    <p>Decide if a job is worth applying to.</p>
    <button onclick="showEULA()">Start</button>
    <div class="footer">HiddenEdgeInfo@proton.me<br>© 2026 HiddenEdge</div>
</div>

<div id="eula" class="screen">
    <h2>Terms</h2>
    <input type="checkbox" id="agree"> I agree<br><br>
    <button onclick="continueToEmail()">Continue</button>
    <div class="footer">HiddenEdgeInfo@proton.me<br>© 2026 HiddenEdge</div>
</div>

<div id="email" class="screen">
    <input type="email" id="userEmail"><br>
    <button onclick="enterApp()">Enter</button>
    <div class="footer">HiddenEdgeInfo@proton.me<br>© 2026 HiddenEdge</div>
</div>

<div id="app" class="screen">

    <button onclick="openTracker()">📋 My Applications</button><br>

    <input type="file" id="cv_file"><br>
    <textarea id="job"></textarea><br>

    <button onclick="analyze()">Analyze</button>

    <div id="result"></div>

    <div class="footer">HiddenEdgeInfo@proton.me<br>© 2026 HiddenEdge</div>

</div>

<div id="trackerModal" class="modal">
<div class="modal-content">
<span class="close-btn" onclick="closeTracker()">✖</span>
<h3>Applications</h3>
<table id="trackerTable"></table>
</div>
</div>

<script>

/* ---------- SAFE HELPERS ---------- */

function safe(val, fallback=""){
    return (val === undefined || val === null) ? fallback : val;
}

function safeArray(arr){
    return Array.isArray(arr) ? arr : [];
}

/* ---------- FLOW ---------- */

function showEULA(){ switchScreen("eula"); }

function continueToEmail(){
    if(!document.getElementById("agree").checked){
        alert("Please agree"); return;
    }
    switchScreen("email");
}

function enterApp(){
    const email = document.getElementById("userEmail").value;
    if(!email){ alert("Enter email"); return; }
    switchScreen("app");
}

function switchScreen(id){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* ---------- TRACKER ---------- */

function openTracker(){
    document.getElementById("trackerModal").style.display="block";
    loadTracker();
}

function closeTracker(){
    document.getElementById("trackerModal").style.display="none";
}

function loadTracker(){
    let apps = JSON.parse(localStorage.getItem("apps") || "[]");
    let table = document.getElementById("trackerTable");

    table.innerHTML = "<tr><th>Date</th><th>Job</th></tr>";

    apps.forEach(a=>{
        table.innerHTML += `<tr><td>${safe(a.date)}</td><td>${safe(a.job)}</td></tr>`;
    });
}

/* ---------- ANALYZE ---------- */

let lastJob = "";

async function analyze(){

    const file = document.getElementById("cv_file").files[0];
    const job = document.getElementById("job").value;

    if(!file || !job){
        alert("Upload CV + job"); return;
    }

    lastJob = job.split("\n")[0];

    const formData = new FormData();
    formData.append("cv_file", file);
    formData.append("job_description", job);

    const res = await fetch("/analyze", { method:"POST", body: formData });
    const data = await res.json();

    document.getElementById("result").innerHTML = `
        <h2>Score: ${safe(data.score,"-")}</h2>
        <h3>${safe(data.decision)}</h3>

        <h3>Recommendation</h3>
        <p>${safe(data.apply_recommendation?.decision)}</p>

        <h3>Recruiter</h3>
        <p>${safe(data.recruiter_view?.verdict)}</p>

        <h3>Manager</h3>
        <p>${safe(data.hiring_manager_view?.verdict)}</p>

        <h3>Gaps</h3>
        <ul>${safeArray(data.gaps).map(g=>`<li>${g}</li>`).join("")}</ul>

        <h3>Improvements</h3>
        <ul>${safeArray(data.improvements).map(i=>`<li>${i}</li>`).join("")}</ul>
    `;
}

</script>

</body>
</html>
