<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HiddenEdge</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0b0f2a;
            color: white;
            text-align: center;
            padding: 40px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .subtitle {
            opacity: 0.8;
            margin-bottom: 40px;
        }

        textarea, input {
            width: 80%;
            max-width: 600px;
            margin: 10px auto;
            padding: 10px;
            border-radius: 6px;
            border: none;
        }

        button {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            background: #4da6ff;
            color: white;
        }

        button:hover {
            background: #3399ff;
        }

        #result {
            margin-top: 30px;
            font-size: 20px;
        }
    </style>
</head>

<body>

<h1>HiddenEdge</h1>
<div class="subtitle">
    Know if you should apply — before you waste time.<br>
    Then fix your CV to win the role.
</div>

<input id="email" placeholder="Your email" readonly>

<br><br>

<textarea id="cv" rows="6" placeholder="Paste your CV text..."></textarea>
<br>
<textarea id="job" rows="6" placeholder="Paste job description..."></textarea>

<br>

<button onclick="analyze()">🚀 Analyze My CV</button>

<div id="result"></div>

<br><br>

<button onclick="startCheckout()">💳 Upgrade to Full Access (€9/month)</button>

<script>
/* ------------------------
   EMAIL HANDLING (FIX LOOP)
------------------------ */

function initEmail() {
    let email = localStorage.getItem("user_email");

    if (!email) {
        email = prompt("Enter your email:");

        if (email && email.trim() !== "") {
            localStorage.setItem("user_email", email);
        } else {
            alert("Email is required");
            return initEmail(); // retry until valid
        }
    }

    document.getElementById("email").value = email;
}

initEmail();

/* ------------------------
   ANALYZE
------------------------ */

async function analyze() {
    const cv = document.getElementById("cv").value;
    const job = document.getElementById("job").value;
    const resultDiv = document.getElementById("result");

    resultDiv.innerHTML = "Analyzing...";

    try {
        const response = await fetch("/analyze", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                cv_text: cv,
                job_description: job
            })
        });

        const data = await response.json();

        if (!response.ok) {
            resultDiv.innerHTML = "❌ " + (data.error || "Error");
            return;
        }

        resultDiv.innerHTML =
            "✅ Score: " + data.score + "<br>" +
            "Decision: " + data.decision;

    } catch (error) {
        console.error(error);
        resultDiv.innerHTML = "❌ Analyze failed";
    }
}

/* ------------------------
   STRIPE CHECKOUT
------------------------ */

async function startCheckout() {
    try {
        const response = await fetch("/create_checkout", {
            method: "POST"
        });

        const data = await response.json();

        if (data.url) {
            window.location.href = data.url;
        } else {
            alert("Checkout failed");
        }

    } catch (error) {
        console.error(error);
        alert("Checkout error");
    }
}
</script>

</body>
</html>
