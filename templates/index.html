<!DOCTYPE html>
<html>
<head>
    <title>HiddenEdge</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b0f1a;
            color: white;
            overflow-x: hidden;
        }

        textarea {
            width: 100%;
            height: 220px;
            margin-top: 10px;
            background: rgba(255,255,255,0.05);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px;
        }

        button {
            padding: 10px 15px;
            margin-top: 10px;
            cursor: pointer;
            background: #1f6feb;
            color: white;
            border: none;
        }

        .container {
            display: flex;
            gap: 20px;
        }

        .box {
            width: 50%;
        }

        .bar-container {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            overflow: hidden;
            margin-top: 10px;
        }

        .bar {
            height: 20px;
            width: 0%;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
        }

        /* ===== SPACE BACKGROUND ===== */

        #space-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            background: radial-gradient(ellipse at bottom, #0b0f1a 0%, #05070d 100%);
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            opacity: 0.8;
            border-radius: 50%;
        }

        #milkyway {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(ellipse at center,
                rgba(255,255,255,0.08) 0%,
                rgba(255,255,255,0.04) 20%,
                rgba(255,255,255,0.01) 40%,
                transparent 60%);
            transform: rotate(25deg);
            filter: blur(40px);
        }

        /* Dim background when results active */
        .results-active #space-bg {
            opacity: 0.15;
        }
    </style>
</head>

<body>

<!-- 🌌 SPACE BACKGROUND -->
<div id="space-bg">
    <div id="milkyway"></div>
</div>

<h2>Upload CV(s)</h2>

<input type="file" id="file" multiple>
<button onclick="upload()">Upload</button>

<div class="bar-container">
    <div id="uploadBar" class="bar"></div>
</div>

<h2>Job Description</h2>
<textarea id="job"></textarea>
<button onclick="tailor()">Analyze</button>

<div class="bar-container">
    <div id="tailorBar" class="bar"></div>
</div>

<h2>Compare (Delta)</h2>

<div class="container">
    <div class="box">
        <h3>Master CV</h3>
        <textarea id="master"></textarea>
    </div>

    <div class="box">
        <h3>Tailored CV (Editable)</h3>
        <textarea id="tailored"></textarea>
    </div>
</div>

<br>
<button onclick="download()">Download Tailored CV</button>

<script>

let texts = [];

/* ===== STAR GENERATION ===== */

function generateStars(count = 150) {
    const container = document.getElementById("space-bg");

    for (let i = 0; i < count; i++) {
        let star = document.createElement("div");
        star.className = "star";

        star.style.top = Math.random() * 100 + "%";
        star.style.left = Math.random() * 100 + "%";
        star.style.opacity = Math.random();

        container.appendChild(star);
    }
}

generateStars();

/* ===== UI HELPERS ===== */

function setBar(id, val) {
    document.getElementById(id).style.width = val + "%";
}

/* ===== UPLOAD ===== */

function upload() {

    let files = document.getElementById("file").files;

    if (!files.length) {
        alert("Select at least one file");
        return;
    }

    let form = new FormData();

    for (let i = 0; i < files.length; i++) {
        form.append("files", files[i]);
    }

    setBar("uploadBar", 20);

    fetch("/upload_cv", {
        method: "POST",
        body: form
    })
    .then(r => r.json())
    .then(data => {

        if (data.error) {
            alert(data.error);
            return;
        }

        texts = data.texts || [];
        document.getElementById("master").value = data.master_cv || "";

        setBar("uploadBar", 100);
    });
}

/* ===== ANALYZE ===== */

function tailor() {

    let job = document.getElementById("job").value;

    if (!texts.length) {
        alert("Upload CV first");
        return;
    }

    if (!job) {
        alert("Paste job description");
        return;
    }

    // 🔥 Dim background when analysis starts
    document.body.classList.add("results-active");

    let progress = 10;
    let interval = setInterval(() => {
        if (progress < 90) {
            progress += 10;
            setBar("tailorBar", progress);
        }
    }, 200);

    fetch("/tailor_cv", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            texts: texts,
            job_text: job
        })
    })
    .then(r => r.json())
    .then(data => {

        clearInterval(interval);
        setBar("tailorBar", 100);

        if (data.error) {
            alert(data.error);
            return;
        }

        document.getElementById("master").value = data.master_cv || "";
        document.getElementById("tailored").value = data.tailored_cv || "";
    });
}

/* ===== DOWNLOAD ===== */

function download() {

    let cv = document.getElementById("tailored").value;

    if (!cv) {
        alert("No CV to download");
        return;
    }

    fetch("/download_cv", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ cv: cv })
    })
    .then(res => res.blob())
    .then(blob => {
        let url = window.URL.createObjectURL(blob);
        let a = document.createElement("a");
        a.href = url;
        a.download = "Tailored_CV.docx";
        a.click();
    });
}

</script>

</body>
</html>
