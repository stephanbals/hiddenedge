<!DOCTYPE html>
<html>
<head>
    <title>HiddenEdge</title>

    <style>
        body {
            margin: 30px;
            font-family: Arial;
            background: black;
            color: white;
        }

        textarea {
            width: 100%;
            height: 200px;
            margin-top: 10px;
            background: rgba(255,255,255,0.05);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px;
        }

        button {
            padding: 10px 15px;
            margin-top: 10px;
            cursor: pointer;
            background: #1f6feb;
            color: white;
            border: none;
        }

        .topbar {
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(255,255,255,0.05);
        }

        .uses {
            color: #aaa;
        }

        #analysisResults {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
        }

        .upgrade {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
        }

        .footer {
            margin-top: 50px;
            text-align: center;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>

<body>

<div class="topbar">
    <div id="userEmail"></div>
    <div class="uses" id="usesDisplay"></div>
</div>

<h2>Upload CV(s)</h2>
<input type="file" id="file" multiple>
<button onclick="upload()">Upload</button>

<h2>Job Description</h2>
<textarea id="job"></textarea>
<button onclick="analyze()">Analyze</button>

<div id="analysisResults"></div>

<div class="footer">
    For contact please email to HiddenEdgeInfo@proton.me<br>
    HiddenEdge, all rights reserved 2026 (C)
</div>

<script>

let texts = [];
let userEmail = "";

/* ===== INIT ===== */

function init() {
    userEmail = localStorage.getItem("hiddenedge_email") || "User";
    document.getElementById("userEmail").innerText = userEmail;
    updateUsesDisplay();
}

/* ===== USAGE ===== */

function getKey() {
    return "hiddenedge_uses_" + userEmail;
}

function getUses() {
    return parseInt(localStorage.getItem(getKey()) || "0");
}

function incrementUses() {
    let uses = getUses() + 1;
    localStorage.setItem(getKey(), uses.toString());
}

function remainingUses() {
    return 3 - getUses();
}

function updateUsesDisplay() {
    let remaining = remainingUses();
    document.getElementById("usesDisplay").innerText =
        remaining > 0
        ? `${remaining} free analyses remaining`
        : "Free limit reached — upgrade required";
}

/* ===== UPLOAD ===== */

function upload() {
    let files = document.getElementById("file").files;

    let form = new FormData();
    for (let i = 0; i < files.length; i++) {
        form.append("files", files[i]);
    }

    fetch("/upload_cv", {
        method: "POST",
        body: form
    })
    .then(r => r.json())
    .then(data => {
        texts = data.texts || [];
    });
}

/* ===== ANALYZE ===== */

function analyze() {

    let job = document.getElementById("job").value;

    if (!texts.length || !job) {
        alert("Upload CV and enter job description");
        return;
    }

    // 🔥 CLEAR OLD RESULT + SHOW LOADING
    document.getElementById("analysisResults").innerHTML = `
        <p>Analyzing...</p>
    `;

    fetch("/analyze", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            texts: texts,
            job_text: job
        })
    })
    .then(r => r.json())
    .then(data => {

        // ONLY increment AFTER success
        if (remainingUses() > 0) {
            incrementUses();
        }

        updateUsesDisplay();

        document.getElementById("analysisResults").innerHTML = `
            <h2>Match Score: ${data.match_score}%</h2>
            <p>${data.context_line || ""}</p>

            <div class="upgrade">
                <p>
                    Unlock full recruiter & hiring manager insights<br><br>
                    €9/month • Unlimited analyses • Cancel anytime
                </p>
                <button onclick="goToUpgrade()">Upgrade</button>
            </div>
        `;
    });
}

/* ===== STRIPE ===== */

function goToUpgrade() {
    window.location.href = "/create-checkout-session";
}

init();

</script>

</body>
</html>
