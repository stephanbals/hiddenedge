<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HiddenEdge</title>
<style>
body {
    font-family: Arial;
    background: #0b0f2a;
    color: white;
    text-align: center;
    padding: 40px;
}

input, textarea {
    width: 400px;
    margin: 10px;
    padding: 10px;
}

button {
    padding: 10px 20px;
    margin-top: 10px;
    background: #4da6ff;
    border: none;
    color: white;
    cursor: pointer;
}

#result {
    margin-top: 30px;
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
    text-align: left;
}
</style>
</head>

<body>

<h1>HiddenEdge</h1>

<input type="email" id="email" placeholder="Your email">
<br>

<input type="file" id="cv_file">
<br>

<textarea id="job" rows="6" placeholder="Paste job description"></textarea>
<br>

<button onclick="analyze()">Analyze</button>

<div id="result"></div>

<script>

async function analyze(){

    const file = document.getElementById("cv_file").files[0];
    const job = document.getElementById("job").value;

    if(!file || !job){
        alert("Missing input");
        return;
    }

    document.getElementById("result").innerHTML = "Analyzing...";

    const formData = new FormData();
    formData.append("cv_file", file);
    formData.append("job_description", job);

    const res = await fetch("/analyze", {
        method:"POST",
        body: formData
    });

    const data = await res.json();

    document.getElementById("result").innerHTML = `
        <h2>Score: ${data.score}</h2>
        <h3>${data.decision}</h3>

        <h4>Key Requirements</h4>
        <ul>${(data.key_requirements || []).map(x=>`<li>${x}</li>`).join("")}</ul>

        <h4>Strengths</h4>
        <ul>${(data.strengths || []).map(x=>`<li>${x}</li>`).join("")}</ul>

        <h4>Gaps</h4>
        <ul>${(data.gaps || []).map(x=>`<li>${x}</li>`).join("")}</ul>

        <h4>Improvements</h4>
        <ul>${(data.improvements || []).map(x=>`<li>${x}</li>`).join("")}</ul>

        <h4>Advice</h4>
        <p>${data.final_advice || ""}</p>
    `;
}

</script>

</body>
</html>
