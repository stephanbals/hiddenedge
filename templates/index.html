<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HiddenEdge</title>

<link rel="icon" href="/static/favicon.ico">

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;

    /* 🌌 BASE SPACE COLOR */
    background: radial-gradient(ellipse at center, #0b0f2a 0%, #000 100%);
    overflow-x: hidden;
}

/* 🌌 STARFIELD (VISIBLE!) */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background-image:
        radial-gradient(2px 2px at 20% 30%, white, transparent),
        radial-gradient(2px 2px at 70% 80%, white, transparent),
        radial-gradient(1.5px 1.5px at 50% 60%, #fff, transparent),
        radial-gradient(2px 2px at 80% 20%, #fff, transparent),
        radial-gradient(1.5px 1.5px at 30% 70%, #fff, transparent),
        radial-gradient(2px 2px at 60% 40%, #fff, transparent);
    opacity: 0.9;
    z-index: 0;
}

/* 🌌 MILKY WAY GLOW (SUBTLE STRIP) */
body::after {
    content: "";
    position: fixed;
    width: 120%;
    height: 120%;
    background: radial-gradient(
        ellipse at center,
        rgba(120,140,255,0.15) 0%,
        rgba(0,0,0,0) 70%
    );
    transform: rotate(-20deg);
    z-index: 0;
}

/* ENSURE UI IS ABOVE BACKGROUND */
.screen, .modal, .logo, button, input, textarea {
    position: relative;
    z-index: 2;
}

/* SCREENS */
.screen {
    display: none;
    padding: 40px;
    min-height: 100vh;
}

.active {
    display: block;
}

/* LOGO */
.logo {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 80px;
}

/* HELP BUTTON */
.help-btn {
    position: absolute;
    top: 20px;
    right: 20px;
}

/* INPUTS */
input, textarea {
    width: 400px;
    margin: 10px;
    padding: 10px;
}

/* BUTTONS */
button {
    padding: 10px 20px;
    margin: 10px;
    background: #4da6ff;
    border: none;
    cursor: pointer;
}

/* FOOTER */
.footer {
    position: absolute;
    bottom: 10px;
    width: 100%;
    font-size: 12px;
    color: #888;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    z-index: 2000;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
}

.modal-content {
    background: #1a1f3d;
    margin: 8% auto;
    padding: 20px;
    width: 500px;
    border-radius: 10px;
    position: relative;
}

.close-btn {
    position: absolute;
    top: 10px;
    right: 15px;
    cursor: pointer;
}
</style>
</head>

<body>

<img src="/static/logo.png" class="logo">
<button class="help-btn" onclick="openHelp()">Help</button>

<!-- LANDING -->
<div id="landing" class="screen active">
    <h1>HiddenEdge</h1>

    <p>
        HiddenEdge helps you decide if a job is worth applying to.<br><br>
        We analyze your CV against job descriptions and improve your chances.
    </p>

    <button onclick="showEULA()">Start</button>

    <div class="footer">
        HiddenEdgeInfo@proton.me<br>
        © 2026 HiddenEdge — All rights reserved
    </div>
</div>

<!-- (rest of your screens unchanged) -->

<script>
function openHelp(){ alert("Help coming next step"); }
function showEULA(){ alert("Flow intact"); }
</script>

</body>
</html>
