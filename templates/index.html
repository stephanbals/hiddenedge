<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HiddenEdge</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: black;
    overflow-x: hidden;
}

/* 🌌 STRONG MILKY WAY (VISIBLE) */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.35), transparent 40%),
        radial-gradient(circle at 30% 60%, rgba(0,140,255,0.4), transparent 60%),
        radial-gradient(circle at 70% 40%, rgba(180,100,255,0.4), transparent 60%),
        black;
    transform: rotate(-20deg);
    filter: blur(70px);
    z-index: -3;
}

/* ✨ CLEAR TWINKLING STARS */
body::after {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;

    background-image:
        radial-gradient(3px 3px at 20% 30%, white, transparent),
        radial-gradient(2px 2px at 70% 60%, white, transparent),
        radial-gradient(3px 3px at 40% 80%, white, transparent),
        radial-gradient(2px 2px at 90% 20%, white, transparent),
        radial-gradient(2px 2px at 10% 70%, white, transparent),
        radial-gradient(3px 3px at 60% 50%, white, transparent);

    animation: twinkle 1.5s infinite alternate;
    z-index: -2;
}

@keyframes twinkle {
    0% { opacity: 0.3; }
    100% { opacity: 1; }
}

/* SCREEN */
.screen {
    display: none;
    min-height: 100vh;
}

.active {
    display: block;
}

/* 🔥 TOP ROBOT BAND */
.landing-visual {
    height: 40vh;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 80px;
}

/* 🤖 BIG + CENTERED */
.character {
    width: 200px;
}

/* TEXT */
.center {
    text-align: center;
    margin-top: 20px;
}

/* 🔥 WELCOME BANNER */
.banner {
    font-size: 22px;
    margin-bottom: 20px;
    color: #9fd3ff;
}

/* BUTTON */
button {
    padding: 15px 30px;
    font-size: 18px;
    background: #4da6ff;
    border: none;
    cursor: pointer;
}

</style>
</head>

<body>

<div id="landing" class="screen active">

    <!-- 🤖 ROBOTS (CENTERED & VISIBLE) -->
    <div class="landing-visual">
        <img src="/static/robots/nestor.png" class="character">
        <img src="/static/robots/alec.png" class="character">
        <img src="/static/robots/helper.png" class="character">
    </div>

    <div class="center">

        <!-- 🔥 NEW BANNER -->
        <div class="banner">
            Welcome to HiddenEdge — where your chances for successful job applications really come to life
        </div>

        <h1>HiddenEdge</h1>

        <p>
            Nestor evaluates your fit<br>
            Alec improves your CV<br>
            Helper guides you
        </p>

        <button onclick="window.location.href='/eula'">
            Click here to start
        </button>

    </div>

</div>

</body>
</html>
