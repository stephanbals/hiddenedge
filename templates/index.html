<!DOCTYPE html>
<html>
<head>
    <title>HiddenEdge</title>

    <style>
        body {
            margin: 30px;
            font-family: Arial;
            background: black;
            color: white;
        }

        textarea {
            width: 100%;
            height: 200px;
            margin-top: 10px;
            background: rgba(255,255,255,0.05);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px;
        }

        button {
            padding: 10px 15px;
            margin-top: 10px;
            cursor: pointer;
            background: #1f6feb;
            color: white;
            border: none;
        }

        .bar-container {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            overflow: hidden;
            margin-top: 10px;
        }

        .bar {
            height: 20px;
            width: 0%;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
        }

        #analysisResults {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .locked {
            opacity: 0.4;
        }

        .upgrade {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .uses {
            margin-top: 10px;
            color: #aaa;
        }
    </style>
</head>

<body>

<h2>Upload CV(s)</h2>

<input type="file" id="file" multiple>
<button onclick="upload()">Upload</button>

<div class="bar-container">
    <div id="uploadBar" class="bar"></div>
</div>

<h2>Job Description</h2>
<textarea id="job"></textarea>
<button onclick="analyze()">Analyze</button>

<div class="bar-container">
    <div id="analyzeBar" class="bar"></div>
</div>

<div id="analysisResults"></div>

<script>

let texts = [];

/* ===== USAGE CONTROL ===== */

function getUses() {
    return parseInt(localStorage.getItem("hiddenedge_uses") || "0");
}

function incrementUses() {
    let uses = getUses() + 1;
    localStorage.setItem("hiddenedge_uses", uses.toString());
    return uses;
}

function remainingUses() {
    return 3 - getUses();
}

/* ===== UPLOAD ===== */

function upload() {

    let files = document.getElementById("file").files;

    if (!files.length) {
        alert("Select a file");
        return;
    }

    let form = new FormData();

    for (let i = 0; i < files.length; i++) {
        form.append("files", files[i]);
    }

    fetch("/upload_cv", {
        method: "POST",
        body: form
    })
    .then(r => r.json())
    .then(data => {
        texts = data.texts || [];
    });
}

/* ===== ANALYZE ===== */

function analyze() {

    if (remainingUses() <= 0) {
        showLockedOnly();
        return;
    }

    let job = document.getElementById("job").value;

    if (!texts.length || !job) {
        alert("Upload CV and enter job description");
        return;
    }

    fetch("/analyze", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            texts: texts,
            job_text: job
        })
    })
    .then(r => r.json())
    .then(data => {

        incrementUses();

        let remaining = remainingUses();

        document.getElementById("analysisResults").innerHTML = `
            <h2>Match Score: ${data.match_score}%</h2>

            <div class="uses">
                ${remaining >= 0 ? remaining : 0} free analyses remaining
            </div>

            <div class="locked">
                <h3>👔 Recruiter Analysis</h3>
                <p>🔒 Upgrade required</p>

                <h3>🧠 Hiring Manager Analysis</h3>
                <p>🔒 Upgrade required</p>

                <h3>🎯 Advice</h3>
                <p>🔒 Upgrade required</p>
            </div>

            <div class="upgrade">
                <p>
                    Unlock full recruiter & hiring manager insights<br><br>
                    €9/month • Unlimited analyses • Cancel anytime
                </p>

                <button onclick="goToUpgrade()">Upgrade</button>
            </div>
        `;
    });
}

/* ===== LOCKED STATE ===== */

function showLockedOnly() {

    document.getElementById("analysisResults").innerHTML = `
        <h2>Free limit reached</h2>

        <div class="upgrade">
            <p>
                Unlock full recruiter & hiring manager insights<br><br>
                €9/month • Unlimited analyses • Cancel anytime
            </p>

            <button onclick="goToUpgrade()">Upgrade</button>
        </div>
    `;
}

/* ===== STRIPE ===== */

function goToUpgrade() {
    window.location.href = "/create-checkout-session";
}

</script>

</body>
</html>
