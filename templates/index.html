<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HiddenEdge</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial, sans-serif;
    background: #0b0f2a;
    color: white;
    text-align: center;
    padding: 40px;
}

input, textarea {
    width: 80%;
    max-width: 600px;
    margin: 10px auto;
    padding: 10px;
    border-radius: 6px;
    border: none;
}

button {
    margin-top: 20px;
    padding: 15px 30px;
    border-radius: 10px;
    background: #4da6ff;
    color: white;
    border: none;
}

.card {
    background: #141a3a;
    padding: 20px;
    border-radius: 10px;
    margin: 15px auto;
    max-width: 700px;
    text-align: left;
}

.robot-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: bold;
}

.robot {
    width: 40px;
}

.footer {
    margin-top: 50px;
    font-size: 12px;
    opacity: 0.6;
}

.modal {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.8);
    display:flex;
    align-items:center;
    justify-content:center;
}

.modal-content {
    background:#141a3a;
    padding:30px;
    border-radius:10px;
    max-width:600px;
}
</style>
</head>

<body>

<!-- EULA -->
<div id="eulaModal" class="modal">
    <div class="modal-content">
        <h2>Terms of Use</h2>

        <p>This tool uses AI and provides advisory output only.</p>

        <label>
            <input type="checkbox" id="acceptEula">
            I accept the terms
        </label>

        <br><br>

        <button onclick="acceptEULA()">Continue</button>
    </div>
</div>

<h1>HiddenEdge</h1>

<input id="email" readonly>

<!-- Helper robot near upload -->
<div class="robot-title">
    <img src="/static/robots/helper.png" class="robot">
    Upload your CV
</div>

<input type="file" id="cv_file">

<textarea id="job" rows="6" placeholder="Paste job description..."></textarea>

<button onclick="analyze()">Analyze</button>

<div id="result"></div>

<button onclick="startCheckout()">Upgrade</button>

<div class="footer">
HiddenEdgeInfo@proton.me<br>
SB3PM Advisory & Services Ltd.<br>
ProductiveYou range<br>
All rights reserved
</div>

<script>

function acceptEULA() {
    if (!document.getElementById("acceptEula").checked) {
        alert("Accept terms first");
        return;
    }
    localStorage.setItem("eulaAccepted", "true");
    document.getElementById("eulaModal").style.display = "none";
}

if (localStorage.getItem("eulaAccepted") === "true") {
    document.getElementById("eulaModal").style.display = "none";
}

function initEmail() {
    let email = localStorage.getItem("user_email");
    if (!email) {
        email = prompt("Enter your email:");
        if (!email) return initEmail();
        localStorage.setItem("user_email", email);
    }
    document.getElementById("email").value = email;
}
initEmail();

async function analyze() {

    const file = document.getElementById("cv_file").files[0];
    const job = document.getElementById("job").value;

    if (!file || !job) {
        alert("Upload CV + job description");
        return;
    }

    const formData = new FormData();
    formData.append("cv_file", file);
    formData.append("job_description", job);
    formData.append("email", localStorage.getItem("user_email"));

    const res = await fetch("/analyze", {
        method: "POST",
        body: formData
    });

    if (res.status === 403) {
        showPaywall();
        return;
    }

    const data = await res.json();

    renderResult(data);
}

function renderResult(data) {

    document.getElementById("result").innerHTML = `
        <div class="card">
            <div class="robot-title">
                <img src="/static/robots/nestor.png" class="robot">
                Nestor — Decision Engine
            </div>

            <h2>${data.score}</h2>
            <p>${data.decision}</p>
            <p>${data.paid ? "💎 Premium" : "Free left: " + data.remaining}</p>
        </div>

        <div class="card">
            <div class="robot-title">
                <img src="/static/robots/nestor.png" class="robot">
                Strengths
            </div>
            <ul>${data.strengths.map(s => `<li>${s}</li>`).join("")}</ul>
        </div>

        <div class="card">
            <div class="robot-title">
                <img src="/static/robots/nestor.png" class="robot">
                Gaps
            </div>
            <ul>${data.gaps.map(g => `<li>${g}</li>`).join("")}</ul>
        </div>

        <div class="card">
            <div class="robot-title">
                <img src="/static/robots/alec.png" class="robot">
                CV Improvements
            </div>
            <ul>${data.improvements.map(i => `<li>${i}</li>`).join("")}</ul>
        </div>
    `;
}

function showPaywall() {
    document.getElementById("result").innerHTML = `
        <div class="card">
            <h2>Free limit reached</h2>
            <button onclick="startCheckout()">Unlock</button>
        </div>
    `;
}

async function startCheckout() {
    const res = await fetch("/create_checkout", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            email: localStorage.getItem("user_email")
        })
    });

    const data = await res.json();

    if (data.url) window.location.href = data.url;
}

</script>

</body>
</html>
