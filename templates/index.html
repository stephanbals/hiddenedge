<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HiddenEdge</title>

<style>
body {
    font-family: Arial;
    background: #0b0f2a;
    color: white;
    text-align: center;
    padding: 40px;
}

input, textarea {
    width: 400px;
    margin: 10px;
    padding: 10px;
}

button {
    padding: 10px 20px;
    margin: 10px;
    background: #4da6ff;
    border: none;
    color: white;
    cursor: pointer;
}

#result, #alecResult {
    margin-top: 30px;
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
    text-align: left;
    white-space: pre-wrap;
}

hr {
    margin: 30px 0;
    border: 1px solid #2a2f55;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
}

.modal-content {
    background: #1a1f3d;
    margin: 10% auto;
    padding: 20px;
    width: 400px;
    border-radius: 10px;
    text-align: center;
}

.modal button {
    margin-top: 15px;
}
</style>
</head>

<body>

<h1>HiddenEdge</h1>

<input type="file" id="cv_file"><br>
<textarea id="job" rows="6" placeholder="Paste job description"></textarea><br>

<button onclick="analyze()">Analyze</button>
<button onclick="handleAlec()">✨ Improve CV (Alec)</button>

<div id="result"></div>

<hr>

<h2>✨ Tailored CV Output</h2>
<div id="alecResult"></div>

<!-- MODAL -->
<div id="alecModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle"></h3>
        <p id="modalMessage"></p>
        <button onclick="proceedAlec()">Proceed Anyway</button>
        <button onclick="closeModal()">Cancel</button>
    </div>
</div>

<script>

let lastAnalysis = null;

async function analyze(){
    const file = document.getElementById("cv_file").files[0];
    const job = document.getElementById("job").value;

    if(!file || !job){
        alert("Missing input");
        return;
    }

    document.getElementById("result").innerHTML = "Analyzing...";

    const formData = new FormData();
    formData.append("cv_file", file);
    formData.append("job_description", job);

    const res = await fetch("/analyze", { method:"POST", body: formData });
    const data = await res.json();

    lastAnalysis = data;

    document.getElementById("result").innerHTML = `
        <h2>Score: ${data.score}</h2>
        <h3>${data.decision}</h3>
        <h3>Hiring Signal: ${data.hiring_signal}</h3>

        <h3>🎯 Recommendation</h3>
        <p><strong>${data.apply_recommendation?.decision}</strong></p>
        <p>${data.apply_recommendation?.reason}</p>

        <h3>🔁 Better-Fit Roles</h3>
        <ul>${(data.better_fit_roles || []).map(x=>`<li>${x}</li>`).join("")}</ul>

        <hr>

        <h3>🧾 Recruiter View</h3>
        <p>${data.recruiter_view?.verdict}</p>

        <h3>🧠 Hiring Manager View</h3>
        <p>${data.hiring_manager_view?.verdict}</p>

        <hr>

        <h3>🚀 Improvement Plan</h3>
        <ul>${(data.improvement_plan?.priority_actions || []).map(x=>`<li>${x}</li>`).join("")}</ul>

        <hr>

        <h3>Final Advice</h3>
        <p>${data.final_advice}</p>
    `;
}

function handleAlec(){

    if(!lastAnalysis){
        alert("Run analysis first");
        return;
    }

    const score = lastAnalysis.score;
    const decision = lastAnalysis.apply_recommendation?.decision;

    // STRONG WARNING
    if(score < 20 || decision === "Do Not Apply"){
        showModal(
            "Low Fit Detected",
            "Nestor recommends not applying. This role has a fundamental mismatch with your profile. Tailoring your CV is unlikely to change the outcome."
        );
        return;
    }

    // SOFT WARNING
    if(score < 60 || decision === "Consider"){
        showModal(
            "Stretch Role",
            "This role is a partial match. Tailoring your CV may improve your chances, but stronger candidates may exist."
        );
        return;
    }

    // STRONG MATCH → no warning
    runAlec();
}

function showModal(title, message){
    document.getElementById("modalTitle").innerText = title;
    document.getElementById("modalMessage").innerText = message;
    document.getElementById("alecModal").style.display = "block";
}

function closeModal(){
    document.getElementById("alecModal").style.display = "none";
}

function proceedAlec(){
    closeModal();
    runAlec();
}

async function runAlec(){

    const file = document.getElementById("cv_file").files[0];
    const job = document.getElementById("job").value;

    document.getElementById("alecResult").innerHTML = "Improving CV...";

    const formData = new FormData();
    formData.append("cv_file", file);
    formData.append("job_description", job);

    const res = await fetch("/tailor", { method:"POST", body: formData });
    const data = await res.json();

    document.getElementById("alecResult").innerText = data.tailored_cv;
}

</script>

</body>
</html>
