<!DOCTYPE html>
<html>
<head>
    <title>HiddenEdge</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: black;
            color: white;
            overflow-x: hidden;
        }

        /* ===== STARFIELD ===== */

        #space-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            background: black;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
        }

        #milkyway {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle, rgba(255,255,255,0.15), transparent 60%);
            transform: rotate(25deg);
        }

        /* CONTENT ABOVE STARS */
        .content {
            position: relative;
            z-index: 2;
            padding: 30px;
        }

        textarea {
            width: 100%;
            height: 220px;
            margin-top: 10px;
        }

        button {
            padding: 10px 15px;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div id="space-bg">
    <div id="milkyway"></div>
</div>

<div class="content">

<h2>Upload CV(s)</h2>

<input type="file" id="file" multiple>
<button onclick="upload()">Upload</button>

<h2>Job Description</h2>
<textarea id="job"></textarea>
<button onclick="analyze()">Analyze</button>

<h2>Results</h2>

<div id="results"></div>

</div>

<script>

/* ===== FORCE STAR VISIBILITY ===== */
function generateStars(count = 300) {
    const container = document.getElementById("space-bg");

    for (let i = 0; i < count; i++) {
        let star = document.createElement("div");
        star.className = "star";

        star.style.top = Math.random() * 100 + "%";
        star.style.left = Math.random() * 100 + "%";

        container.appendChild(star);
    }
}

window.onload = generateStars;

let texts = [];

/* ===== UPLOAD ===== */

function upload() {
    let files = document.getElementById("file").files;

    let form = new FormData();

    for (let i = 0; i < files.length; i++) {
        form.append("files", files[i]);
    }

    fetch("/upload_cv", {
        method: "POST",
        body: form
    })
    .then(r => r.json())
    .then(data => {
        texts = data.texts || [];
    });
}

/* ===== ANALYZE ===== */

function analyze() {

    let job = document.getElementById("job").value;

    fetch("/analyze", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            texts: texts,
            job_text: job
        })
    })
    .then(r => r.json())
    .then(data => {

        document.getElementById("results").innerHTML = `
            <h2>Score: ${data.match_score}</h2>

            <h3>${data.final_decision}</h3>

            <h3>Recruiter View</h3>
            <p>${data.recruiter_view}</p>

            <h3>Hiring Manager View</h3>
            <p>${data.hiring_manager_view}</p>

            <h3>Advice</h3>
            <p>${data.advice}</p>
        `;
    });
}

</script>

</body>
</html>
