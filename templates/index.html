<!DOCTYPE html>
<html>
<head>
<title>HiddenEdge</title>

<style>
body {
    margin:0;
    font-family:Arial;
    color:white;
    background: radial-gradient(circle at top, #140a2e, #050010);
    text-align:center;
}

.hero {
    padding:80px 20px;
}

.title {
    font-size:42px;
    text-shadow:0 0 20px #4ea3ff;
}

.subtitle {
    margin-top:10px;
    font-size:18px;
    color:#cfe3ff;
}

.start-btn {
    margin-top:30px;
    padding:18px 50px;
    font-size:22px;
    background:#4ea3ff;
    border:none;
    border-radius:12px;
    color:white;
    cursor:pointer;
    box-shadow:0 0 25px #4ea3ff;
}

.counter {
    margin-top:10px;
    font-size:14px;
    color:#aaa;
}

.cards {
    display:flex;
    justify-content:center;
    gap:40px;
    margin-top:60px;
    flex-wrap:wrap;
}

.card {
    width:420px;
    padding:25px;
    border-radius:20px;
    background: rgba(255,255,255,0.05);
    box-shadow:0 0 40px rgba(0,0,0,0.7);
}
</style>
</head>

<body>

<div class="hero">

    <div style="font-size:80px;">🤖</div>

    <div class="title">Welcome to HiddenEdge</div>
    <div class="subtitle">Let’s make your CV get noticed.</div>

    <button class="start-btn" onclick="start()">
        🚀 START HERE
    </button>

    <div class="counter" id="counterText">
        You have Free Trials left: 03
    </div>

</div>

<div class="cards">

    <div class="card">
        <h3>NESTOR ANALYZES</h3>
        <h2>Should you apply?</h2>
        <ul>
            <li>Strong Match</li>
            <li>Stretch Opportunity</li>
            <li>Do NOT Apply</li>
        </ul>
    </div>

    <div class="card">
        <h3>ALEC REFINES</h3>
        <h2>Fit the role perfectly</h2>
        <ul>
            <li>Tailored CV</li>
            <li>Upgrade your CV</li>
        </ul>
    </div>

</div>

<script>

// FREE COUNTER DISPLAY
let count = localStorage.getItem("usage") || 0;
let remaining = 3 - count;
if(remaining < 0) remaining = 0;

document.getElementById("counterText").innerText =
"Free Trials left: " + remaining.toString().padStart(2,'0');

function start(){
    const email = prompt("Enter your email:");
    if(email){
        localStorage.setItem("email", email);
        window.location="/app";
    }
}

</script>

</body>
</html>
