<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HiddenEdge</title>

<style>
body {
    font-family: Arial;
    background: #0b0f2a;
    color: white;
    text-align: center;
    padding: 40px;
}

input, textarea {
    width: 400px;
    margin: 10px;
    padding: 10px;
}

button {
    padding: 10px 20px;
    margin: 10px;
    background: #4da6ff;
    border: none;
    color: white;
    cursor: pointer;
}

#result, #alecResult {
    margin-top: 30px;
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
    text-align: left;
    white-space: pre-wrap;
}

hr {
    margin: 30px 0;
    border: 1px solid #2a2f55;
}

/* MODALS */
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
}

.modal-content {
    background: #1a1f3d;
    margin: 5% auto;
    padding: 20px;
    width: 650px;
    border-radius: 10px;
    text-align: left;
}

table {
    width: 100%;
    border-collapse: collapse;
}

td, th {
    border: 1px solid #444;
    padding: 8px;
}

.note {
    font-size: 12px;
    color: #b0b5ff;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<h1>HiddenEdge</h1>

<button onclick="openTracker()">📋 My Applications</button>

<br>

<input type="file" id="cv_file"><br>
<textarea id="job" rows="6" placeholder="Paste job description"></textarea><br>

<button onclick="analyze()">Analyze</button>
<button onclick="handleAlec()">✨ Improve CV (Alec)</button>

<div id="result"></div>

<hr>

<h2>✨ Tailored CV Output</h2>
<div id="alecResult"></div>

<!-- ALEC MODAL -->
<div id="alecModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle"></h3>
        <p id="modalMessage"></p>
        <button onclick="proceedAlec()">Proceed Anyway</button>
        <button onclick="closeModal()">Cancel</button>
    </div>
</div>

<!-- TRACKER MODAL -->
<div id="trackerModal" class="modal">
    <div class="modal-content">
        <h2>📋 My Applications</h2>

        <div class="note">
            ⚠️ Note: Your application tracker is currently stored on your device (this browser).
            It may not be available on other devices.
        </div>

        <table id="trackerTable">
            <tr>
                <th>Date</th>
                <th>Job</th>
                <th>Company</th>
                <th>Recruiter</th>
                <th>Action</th>
            </tr>
        </table>

        <button onclick="closeTracker()">Close</button>
    </div>
</div>

<script>

let lastAnalysis = null;
let lastJobText = "";

// ---------- ANALYZE ----------

async function analyze(){
    const file = document.getElementById("cv_file").files[0];
    const job = document.getElementById("job").value;

    if(!file || !job){
        alert("Missing input");
        return;
    }

    lastJobText = job;

    document.getElementById("result").innerHTML = "Analyzing...";

    const formData = new FormData();
    formData.append("cv_file", file);
    formData.append("job_description", job);

    const res = await fetch("/analyze", { method:"POST", body: formData });
    const data = await res.json();

    lastAnalysis = data;

    document.getElementById("result").innerHTML = `
        <h2>Score: ${data.score}</h2>
        <h3>${data.decision}</h3>

        <h3>🎯 Recommendation</h3>
        <p><strong>${data.apply_recommendation?.decision}</strong></p>

        <button onclick="applyJob()">✅ Apply</button>
        <button onclick="skipJob()">❌ Skip</button>

        <hr>

        <h3>🔁 Better-Fit Roles</h3>
        <ul>${(data.better_fit_roles || []).map(x=>`<li>${x}</li>`).join("")}</ul>
    `;
}

// ---------- APPLY / SKIP ----------

function applyJob(){

    const entry = {
        date: new Date().toLocaleDateString(),
        job: extractJobTitle(lastJobText),
        company: extractCompany(lastJobText),
        recruiter: extractRecruiter(lastJobText)
    };

    let apps = JSON.parse(localStorage.getItem("applications") || "[]");
    apps.push(entry);
    localStorage.setItem("applications", JSON.stringify(apps));

    alert("Application saved");
}

function skipJob(){
    alert("Skipped");
}

// ---------- TRACKER ----------

function openTracker(){
    document.getElementById("trackerModal").style.display = "block";
    loadTracker();
}

function closeTracker(){
    document.getElementById("trackerModal").style.display = "none";
}

function loadTracker(){

    let table = document.getElementById("trackerTable");
    table.innerHTML = `
        <tr>
            <th>Date</th>
            <th>Job</th>
            <th>Company</th>
            <th>Recruiter</th>
            <th>Action</th>
        </tr>
    `;

    let apps = JSON.parse(localStorage.getItem("applications") || "[]");

    apps.forEach((app, index) => {
        table.innerHTML += `
            <tr>
                <td>${app.date}</td>
                <td>${app.job}</td>
                <td>${app.company}</td>
                <td>${app.recruiter}</td>
                <td><button onclick="deleteApp(${index})">Delete</button></td>
            </tr>
        `;
    });
}

function deleteApp(index){
    let apps = JSON.parse(localStorage.getItem("applications") || "[]");
    apps.splice(index, 1);
    localStorage.setItem("applications", JSON.stringify(apps));
    loadTracker();
}

// ---------- HELPERS ----------

function extractJobTitle(text){
    return text.split("\n")[0] || "Unknown";
}

function extractCompany(text){
    return text.includes("·") ? text.split("·")[1].trim() : "Unknown";
}

function extractRecruiter(text){
    return "Unknown";
}

// ---------- ALEC ----------

function handleAlec(){

    if(!lastAnalysis){
        alert("Run analysis first");
        return;
    }

    const score = lastAnalysis.score;
    const decision = lastAnalysis.apply_recommendation?.decision;

    if(score < 20 || decision === "Do Not Apply"){
        showModal("Low Fit Detected",
        "Nestor recommends not applying. Tailoring your CV is unlikely to change the outcome.");
        return;
    }

    if(score < 60 || decision === "Consider"){
        showModal("Stretch Role",
        "This is a stretch role. Tailoring your CV may improve your chances, but competition may be strong.");
        return;
    }

    runAlec();
}

function showModal(title, message){
    document.getElementById("modalTitle").innerText = title;
    document.getElementById("modalMessage").innerText = message;
    document.getElementById("alecModal").style.display = "block";
}

function closeModal(){
    document.getElementById("alecModal").style.display = "none";
}

function proceedAlec(){
    closeModal();
    runAlec();
}

async function runAlec(){

    const file = document.getElementById("cv_file").files[0];
    const job = document.getElementById("job").value;

    document.getElementById("alecResult").innerHTML = "Improving CV...";

    const formData = new FormData();
    formData.append("cv_file", file);
    formData.append("job_description", job);

    const res = await fetch("/tailor", { method:"POST", body: formData });
    const data = await res.json();

    document.getElementById("alecResult").innerText = data.tailored_cv;
}

</script>

</body>
</html>
