<!DOCTYPE html>
<html>
<head>
<title>EULA</title>
<link rel="icon" href="/static/favicon.ico">

<style>
body {
    margin:0;
    color:white;
    text-align:center;
    font-family:Arial;
    background:black;
}

/* LOGO */
.logo {
    position:fixed;
    top:15px;
    left:20px;
    color:#9fd3ff;
}

/* 🌌 MILKY WAY */
body::before {
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background:
        radial-gradient(circle, rgba(255,255,255,0.5), transparent 40%),
        radial-gradient(circle at 30% 60%, rgba(0,150,255,0.5), transparent 60%),
        radial-gradient(circle at 70% 40%, rgba(200,100,255,0.5), transparent 60%);
    transform:rotate(-20deg);
    filter:blur(70px);
    z-index:-2;
}

/* ✨ STARS */
body::after {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background-image:
        radial-gradient(3px 3px at 20% 30%, white, transparent),
        radial-gradient(2px 2px at 70% 60%, white, transparent),
        radial-gradient(3px 3px at 40% 80%, white, transparent);
    animation:twinkle 1.5s infinite alternate;
    z-index:-1;
}

@keyframes twinkle {
    from {opacity:0.3;}
    to {opacity:1;}
}

/* CONTENT */
.container {
    margin-top:120px;
}

button {
    padding:12px 25px;
    background:#4da6ff;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="logo">HiddenEdge</div>

<div class="container">
    <h2>Terms</h2>

    <input type="checkbox" id="agree"> I agree

    <br><br>

    <button onclick="go()">Continue</button>
</div>

<script>
function go() {
    if (!document.getElementById("agree").checked) {
        alert("You must agree");
        return;
    }

    window.location.replace("/email");
}
</script>

</body>
</html>
