<!DOCTYPE html>
<html>
<head>
<title>HiddenEdge</title>

<style>
body { margin:0; background:black; color:white; font-family:Arial; }

.container { width:65%; margin:auto; margin-top:80px; text-align:center; }

h1 { color:#9fd3ff; }

.section { margin-top:30px; }

textarea { width:100%; height:160px; padding:12px; }

button {
    padding:12px 28px;
    background:#4da6ff;
    border:none;
    cursor:pointer;
    margin-top:20px;
    border-radius:6px;
}

.card {
    background:#1c1c1c;
    padding:25px;
    border-radius:12px;
    margin-top:20px;
    text-align:left;
}

#analyzeHint {
    display:none;
    margin-top:15px;
    color:#9fd3ff;
    animation:pulse 1.2s infinite;
}

@keyframes pulse {
    0% {opacity:0.4;}
    50% {opacity:1;}
    100% {opacity:0.4;}
}
</style>
</head>

<body>

<div class="container">

<h1>HiddenEdge</h1>

<div class="section">
<input type="file" id="files">
</div>

<div class="section">
<textarea id="job" placeholder="Paste job description"></textarea>
</div>

<button onclick="analyze()">Analyze</button>
<button onclick="resetAnalysis()">Reset</button>

<div id="analyzeHint">⏳ Running new analysis…</div>

<div id="resultBox" style="display:none;">

<div class="card">
<h2 id="decision"></h2>
<h3 id="score"></h3>
<p id="recruiter"></p>
<p id="manager"></p>
</div>

<div id="gapSection" class="card" style="display:none;">
<ul id="gaps"></ul>
<ul id="actions"></ul>
</div>

<div id="altRolesSection" class="card" style="display:none;">
<ul id="altRoles"></ul>
</div>

</div>

</div>

<script>

async function analyze(){

    // 🔥 CLEAR OLD RESULTS FIRST
    document.getElementById("resultBox").style.display = "none";
    document.getElementById("gaps").innerHTML = "";
    document.getElementById("actions").innerHTML = "";
    document.getElementById("altRoles").innerHTML = "";

    document.getElementById("analyzeHint").style.display = "block";

    const file = document.getElementById("files").files[0];
    const job = document.getElementById("job").value;

    const fd = new FormData();
    fd.append("file", file);
    fd.append("job", job);

    const res = await fetch("/analyze?ts=" + new Date().getTime(), {
        method:"POST",
        body:fd,
        cache:"no-store"
    });

    const data = await res.json();

    document.getElementById("decision").innerText = data.nestor.decision;
    document.getElementById("score").innerText = "Score: " + data.nestor.fit_score;
    document.getElementById("recruiter").innerText = data.nestor.recruiter_view;
    document.getElementById("manager").innerText = data.nestor.hiring_manager_view;

    // GAPS
    if(data.gaps){
        data.gaps.forEach(x=>{
            document.getElementById("gaps").innerHTML += "<li>"+x+"</li>";
        });
    }

    if(data.actions){
        data.actions.forEach(x=>{
            document.getElementById("actions").innerHTML += "<li>"+x+"</li>";
        });
    }

    // ALT ROLES
    if(data.alternative_roles){
        data.alternative_roles.forEach(x=>{
            document.getElementById("altRoles").innerHTML += "<li>"+x+"</li>";
        });
    }

    document.getElementById("resultBox").style.display = "block";
    document.getElementById("analyzeHint").style.display = "none";

    document.getElementById("resultBox").scrollIntoView({behavior:"smooth"});
}

function resetAnalysis(){
    document.getElementById("job").value = "";
    document.getElementById("resultBox").style.display = "none";
}

</script>

</body>
</html>
