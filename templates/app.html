<!DOCTYPE html>
<html>
<head>
    <title>HiddenEdge</title>
</head>
<body>

<h2>HiddenEdge</h2>

<input type="file" id="file">
<textarea id="job" placeholder="Paste job description"></textarea>

<button onclick="analyze()">Analyze</button>
<button onclick="generateCV()">Generate CV</button>
<button onclick="pay()">Unlock</button>

<h3>Result</h3>
<textarea id="output"></textarea>

<script>

let email = localStorage.getItem("email");
if (!email) window.location.href = "/email";

function analyze() {

    let file = document.getElementById("file").files[0];
    let job = document.getElementById("job").value;

    let form = new FormData();
    form.append("file", file);
    form.append("job_text", job);
    form.append("email", email);

    fetch("/analyze", {
        method: "POST",
        body: form
    })
    .then(async r => {

        if (r.status === 403) {
            alert("Free limit reached. Please unlock.");
            return;
        }

        let data = await r.json();
        document.getElementById("output").value = JSON.stringify(data, null, 2);
    });
}

function generateCV() {

    let file = document.getElementById("file").files[0];
    let job = document.getElementById("job").value;

    let form = new FormData();
    form.append("file", file);
    form.append("job_text", job);
    form.append("email", email);

    fetch("/alec", {
        method: "POST",
        body: form
    })
    .then(async r => {

        if (r.status === 403) {
            alert("Free limit reached. Please unlock.");
            return;
        }

        let data = await r.json();
        document.getElementById("output").value = data.cv;
    });
}

function pay() {
    fetch("/create-checkout-session", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email: email })
    })
    .then(r => r.json())
    .then(data => {
        window.location.href = data.url;
    });
}

</script>

</body>
</html>
