<!DOCTYPE html>
<html>
<head>
<title>HiddenEdge</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}

/* INPUTS */
textarea {
    width: 80%;
    height: 120px;
}

input {
    padding: 6px;
}

/* BUTTON */
button {
    padding: 12px 24px;
    margin-top: 20px;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    font-size: 16px;
}

/* ANALYZE BUTTON */
#analyzeBtn {
    background: #4ea3ff;
    color: white;
}

/* LOADING STATE */
.processing {
    background: #00c853 !important;
    animation: pulse 1.2s infinite;
}

@keyframes pulse {
    0% { box-shadow: 0 0 0px #00c853; }
    50% { box-shadow: 0 0 20px #00c853; }
    100% { box-shadow: 0 0 0px #00c853; }
}

/* RESULT BOX */
#resultBox {
    margin-top: 40px;
    padding: 25px;
    border-radius: 10px;
    background: #1c1c1c;
    display: none;
}
</style>

</head>

<body>

<h2>Email</h2>
<input id="email"><br><br>

<h2>Upload CV</h2>
<input type="file" id="files"><br><br>

<h2>Job Description</h2>
<textarea id="job"></textarea><br>

<button id="analyzeBtn" onclick="analyze()">Analyze</button>

<!-- RESULT AREA -->
<div id="resultBox">
    <h2 id="decision"></h2>
    <h3 id="score"></h3>
    <button onclick="pay()">Improve CV</button>
</div>

<script>

// preload email
document.getElementById("email").value =
    localStorage.getItem("email") || "";

// ---------------- ANALYZE ----------------

async function analyze(){

    const btn = document.getElementById("analyzeBtn");

    const email = document.getElementById("email").value;
    const job = document.getElementById("job").value;
    const files = document.getElementById("files").files;

    if(!email || files.length === 0 || !job){
        alert("Fill all fields");
        return;
    }

    // LOADING STATE
    btn.innerText = "Analyzing...";
    btn.classList.add("processing");
    btn.disabled = true;

    localStorage.setItem("email", email);

    let fd = new FormData();
    fd.append("email", email);
    fd.append("job", job);
    fd.append("files", files[0]);

    try {

        const res = await fetch("/analyze", {
            method: "POST",
            body: fd
        });

        const data = await res.json();

        console.log("DATA:", data);

        const decision = data.nestor?.decision || "Error";
        const score = data.nestor?.fit_score || 0;

        // SHOW RESULT
        document.getElementById("decision").innerText = "Decision: " + decision;
        document.getElementById("score").innerText = "Score: " + score;

        const box = document.getElementById("resultBox");
        box.style.display = "block";

        // 🔥 AUTO SCROLL TO RESULT
        box.scrollIntoView({ behavior: "smooth" });

    } catch(err){
        console.error("ANALYZE ERROR:", err);
        alert("Analyze failed");
    }

    // RESET BUTTON
    btn.innerText = "Analyze";
    btn.classList.remove("processing");
    btn.disabled = false;
}

// ---------------- PAY ----------------

async function pay(){

    const email = document.getElementById("email").value;

    try {

        const res = await fetch("/create_checkout", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({email})
        });

        const data = await res.json();

        if(data.url){
            window.location.href = data.url;
        } else {
            alert("Checkout error");
        }

    } catch(err){
        console.error("PAY ERROR:", err);
        alert("Checkout error");
    }
}

</script>

</body>
</html>
