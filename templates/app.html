<!DOCTYPE html>
<html>
<head>
<title>HiddenEdge</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
}

.container {
    width: 65%;
    margin: auto;
    margin-top: 80px;
    text-align: center;
}

h1 {
    color: #9fd3ff;
}

.subtitle {
    color: #ccc;
    margin-bottom: 40px;
}

.section {
    margin-top: 30px;
}

input[type="text"] {
    padding: 12px;
    width: 60%;
}

textarea {
    width: 100%;
    height: 160px;
    padding: 12px;
}

button {
    padding: 12px 28px;
    font-size: 16px;
    background: #4da6ff;
    border: none;
    cursor: pointer;
    margin-top: 20px;
    border-radius: 6px;
}

.card {
    background: #1c1c1c;
    padding: 25px;
    border-radius: 12px;
    margin-top: 20px;
    text-align: left;
}

.warning {
    margin-top: 20px;
    font-weight: bold;
}

pre {
    white-space: pre-wrap;
    background: #111;
    padding: 15px;
}

#analyzeHint {
    display: none;
    margin-top: 15px;
    color: #9fd3ff;
    animation: pulse 1.2s infinite;
}

@keyframes pulse {
    0% { opacity: 0.4; }
    50% { opacity: 1; }
    100% { opacity: 0.4; }
}
</style>
</head>

<body>

<div class="container">

<h1>HiddenEdge</h1>
<p class="subtitle">Analyze your CV and get a tailored version</p>

<div class="section">
    <input id="email" placeholder="Email (session only)">
</div>

<div class="section">
    <input type="file" id="files">
</div>

<div class="section">
    <textarea id="job" placeholder="Paste job description"></textarea>
</div>

<button onclick="analyze()">Analyze</button>

<div id="analyzeHint">⏳ Analysis in progress… scroll down shortly</div>

<div id="resultBox" style="display:none;">

<div class="card">
<h2 id="decision"></h2>
<h3 id="score"></h3>
<p id="recruiter"></p>
<p id="manager"></p>
</div>

<div class="warning" id="warning"></div>

<div id="gapSection" class="card" style="display:none;">
<h3>Key Gaps</h3>
<ul id="gaps"></ul>
<h3>Recommended Actions</h3>
<ul id="actions"></ul>
</div>

<div id="altRolesSection" class="card" style="display:none;">
<h3>Better Matching Roles</h3>
<ul id="altRoles"></ul>
</div>

<button id="generateBtn" onclick="generateCV()">Generate CV</button>

<div class="card">
<pre id="alec"></pre>
<button onclick="downloadCV()">Download CV (.docx)</button>
</div>

</div>

</div>

<script>

let globalCV = "";
let globalJob = "";

async function analyze(){

    document.getElementById("analyzeHint").style.display = "block";

    const file = document.getElementById("files").files[0];
    const job = document.getElementById("job").value;

    const fd = new FormData();
    fd.append("file", file);
    fd.append("job", job);

    const res = await fetch("/analyze", {method:"POST", body:fd});
    const data = await res.json();

    globalCV = data.cv_text;
    globalJob = data.job_text;

    const score = data.nestor.fit_score;

    document.getElementById("decision").innerText = data.nestor.decision;
    document.getElementById("score").innerText = "Score: " + score;
    document.getElementById("recruiter").innerText = data.nestor.recruiter_view;
    document.getElementById("manager").innerText = data.nestor.hiring_manager_view;

    let warning = "";

    if(score < 50){
        warning = "⚠️ Low match";
        document.getElementById("generateBtn").innerText = "Generate CV anyway";
    } else if(score < 70){
        warning = "⚠️ Partial match";
    } else {
        warning = "✅ Strong match";
    }

    document.getElementById("warning").innerText = warning;

    const gaps = data.gaps || [];
    const actions = data.actions || [];
    const alt = data.alternative_roles || [];

    if(gaps.length){
        const g = document.getElementById("gaps");
        const a = document.getElementById("actions");
        g.innerHTML = "";
        a.innerHTML = "";
        gaps.forEach(x => g.innerHTML += "<li>"+x+"</li>");
        actions.forEach(x => a.innerHTML += "<li>"+x+"</li>");
        document.getElementById("gapSection").style.display = "block";
    }

    if(alt.length){
        const list = document.getElementById("altRoles");
        list.innerHTML = "";
        alt.forEach(x => list.innerHTML += "<li>"+x+"</li>");
        document.getElementById("altRolesSection").style.display = "block";
    }

    document.getElementById("resultBox").style.display = "block";
    document.getElementById("analyzeHint").style.display = "none";

    document.getElementById("resultBox").scrollIntoView({behavior:"smooth"});
}

async function generateCV(){
    const res = await fetch("/alec", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({cv_text: globalCV, job_text: globalJob})
    });
    const data = await res.json();
    document.getElementById("alec").innerText = data.alec_cv;
}

async function downloadCV(){
    const cv = document.getElementById("alec").innerText;
    const res = await fetch("/download_cv", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({cv})
    });
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "HiddenEdge_CV.docx";
    a.click();
}

</script>

</body>
</html>
