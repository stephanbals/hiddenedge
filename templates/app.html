<!DOCTYPE html>
<html>
<head>
    <title>HiddenEdge</title>
</head>
<body>

<h1>HiddenEdge</h1>

<input type="file" id="cvFile"><br><br>

<textarea id="jobDescription" rows="10" cols="60" placeholder="Paste job description here..."></textarea><br><br>

<button onclick="analyze()">Analyze</button>
<button onclick="unlock()">Unlock</button>

<h2>Result</h2>

<p>Score: <span id="score">-</span></p>
<p>Decision: <span id="decision">-</span></p>

<h3>Recruiter View:</h3>
<p id="recruiter"></p>

<h3>Hiring Manager View:</h3>
<p id="manager"></p>

<script>
let cvText = "";

// =========================
// CV UPLOAD
// =========================
document.getElementById("cvFile").addEventListener("change", function(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        cvText = e.target.result;
    };
    reader.readAsText(file);
});

// =========================
// ANALYZE
// =========================
async function analyze() {
    const jobDescription = document.getElementById("jobDescription").value;

    if (!cvText) {
        alert("Please upload your CV first.");
        return;
    }

    const response = await fetch("/analyze", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            job_description: jobDescription,
            cv_text: cvText
        })
    });

    const data = await response.json();

    if (data.error === "PAYWALL") {
        alert("Free limit reached. Please unlock.");
        return;
    }

    document.getElementById("score").innerText = data.fit_score;
    document.getElementById("decision").innerText = data.decision;
    document.getElementById("recruiter").innerText = data.recruiter_view;
    document.getElementById("manager").innerText = data.hiring_manager_view;
}

// =========================
// UNLOCK (FIXED)
// =========================
async function unlock() {
    try {
        const response = await fetch("/create-checkout-session", {
            method: "POST"
        });

        const data = await response.json();

        if (data.url) {
            window.location.href = data.url;
        } else {
            alert("Stripe session failed.");
        }

    } catch (error) {
        alert("Error connecting to Stripe.");
    }
}
</script>

</body>
</html>
