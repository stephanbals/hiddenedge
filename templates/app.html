<!DOCTYPE html>
<html>
<head>
<title>HiddenEdge</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}
textarea { width: 80%; height: 120px; }
input { padding: 6px; }
button {
    padding: 12px 24px;
    margin-top: 20px;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    font-size: 16px;
}
#analyzeBtn { background: #4ea3ff; color: white; }
#resultBox {
    margin-top: 40px;
    padding: 25px;
    border-radius: 10px;
    background: #1c1c1c;
    display: none;
}
</style>
</head>

<body>

<h2>HiddenEdge</h2>

<h3>Email</h3>
<input id="email"><br><br>

<h3>Upload CV</h3>
<input type="file" id="files"><br><br>

<h3>Job Description</h3>
<textarea id="job"></textarea><br>

<button id="analyzeBtn" onclick="analyze()">Analyze</button>

<div id="resultBox">
    <h2 id="decision"></h2>
    <h3 id="score"></h3>
    <button onclick="pay()">Unlock Full Report (€9)</button>
</div>

<script>

// preload email
document.getElementById("email").value =
    localStorage.getItem("email") || "";

// ---------------- ANALYZE ----------------
async function analyze(){

    const email = document.getElementById("email").value;
    const job = document.getElementById("job").value;
    const files = document.getElementById("files").files;

    if(!email || files.length === 0 || !job){
        alert("Fill all fields");
        return;
    }

    localStorage.setItem("email", email);

    const fd = new FormData();
    fd.append("file", files[0]);
    fd.append("job", job);

    try {
        const res = await fetch("/analyze", {
            method: "POST",
            body: fd
        });

        const data = await res.json();

        document.getElementById("decision").innerText =
            "Decision: " + data.nestor.decision;

        document.getElementById("score").innerText =
            "Score: " + data.nestor.fit_score;

        document.getElementById("resultBox").style.display = "block";

    } catch(err){
        console.error(err);
        alert("Analyze failed");
    }
}

// ---------------- PAY ----------------
function pay(){
    window.location.href = "/create-checkout-session";
}

</script>

</body>
</html>
