<!DOCTYPE html>
<html>
<head>
    <title>HiddenEdge</title>
</head>

<body>

<h1>HiddenEdge</h1>

<input type="file" id="cvFile"><br><br>

<textarea id="jobDesc" placeholder="Paste job description"></textarea><br><br>

<button onclick="analyze()">Analyze</button>
<button id="unlockBtn">Unlock</button>

<h3>Result</h3>
<textarea id="resultBox" rows="15" cols="80"></textarea>

<script>

let paidUser = new URLSearchParams(window.location.search).get("paid");

async function analyze() {
    const jobDesc = document.getElementById("jobDesc").value;

    const res = await fetch("/analyze", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ job_description: jobDesc })
    });

    const data = await res.json();

    if (data.error === "PAYWALL" && !paidUser) {
        alert("Free limit reached. Please unlock.");
        return;
    }

    document.getElementById("resultBox").value =
        "Score: " + data.fit_score + "\n" +
        "Decision: " + data.decision + "\n\n" +
        "Recruiter View:\n" + data.recruiter_view + "\n\n" +
        "Hiring Manager View:\n" + data.hiring_manager_view;
}


// =========================
// STRIPE UNLOCK
// =========================

document.getElementById("unlockBtn").onclick = async () => {

    const res = await fetch("/create-checkout-session", {
        method: "POST"
    });

    const data = await res.json();

    if (data.url) {
        window.location.href = data.url;
    } else {
        alert("Stripe error");
    }
};

</script>

</body>
</html>
