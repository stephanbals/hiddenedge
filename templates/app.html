<!DOCTYPE html>
<html>
<head>
    <title>HiddenEdge</title>
</head>

<body>

<h2>HiddenEdge</h2>

<input type="file" id="file"><br><br>

<textarea id="job" placeholder="Paste job description" rows="10" cols="60"></textarea><br><br>

<button onclick="analyze()">Analyze</button>
<button onclick="goToCheckout()">Unlock</button>

<br><br>

<textarea id="output" rows="20" cols="80"></textarea>

<script>

let email = localStorage.getItem("email");

function analyze() {

    if (!email) {
        alert("No email found. Restart flow.");
        return;
    }

    let file = document.getElementById("file").files[0];
    let job = document.getElementById("job").value;

    if (!file || !job) {
        alert("Upload CV and paste job description");
        return;
    }

    let form = new FormData();
    form.append("file", file);
    form.append("job_text", job);
    form.append("email", email);

    fetch("/analyze", {
        method: "POST",
        body: form
    })
    .then(res => res.json())
    .then(data => {

        if (data.error === "PAYWALL") {
            alert("Free limit reached. Please unlock.");
            return;
        }

        document.getElementById("output").value =
            "Score: " + data.nestor.fit_score + "\n" +
            "Decision: " + data.nestor.decision + "\n\n" +
            "Recruiter View:\n" + data.nestor.recruiter_view + "\n\n" +
            "Hiring Manager View:\n" + data.nestor.hiring_manager_view;

    })
    .catch(err => {
        alert("Error: " + err);
    });
}

function goToCheckout() {

    if (!email) {
        alert("Missing email.");
        return;
    }

    fetch("/create-checkout-session", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email: email })
    })
    .then(res => res.json())
    .then(data => {
        window.location.href = data.url;
    });
}

</script>

</body>
</html>
