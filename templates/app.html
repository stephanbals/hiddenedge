<!DOCTYPE html>
<html>
<head>
<title>HiddenEdge</title>

<style>
body { margin:0; background:black; color:white; font-family:Arial; }
.container { width:65%; margin:auto; margin-top:80px; text-align:center; }
h1 { color:#9fd3ff; }

textarea { width:100%; height:160px; padding:12px; }

button {
    padding:12px 28px;
    background:#4da6ff;
    border:none;
    cursor:pointer;
    margin-top:20px;
    border-radius:6px;
}

.card {
    background:#1c1c1c;
    padding:25px;
    border-radius:12px;
    margin-top:20px;
    text-align:left;
}

#paywall {
    display:none;
    margin-top:20px;
    background:#222;
    padding:20px;
    border-radius:10px;
}

#analyzeHint {
    display:none;
    margin-top:15px;
    color:#9fd3ff;
    animation:pulse 1.2s infinite;
}

@keyframes pulse {
    0% {opacity:0.4;}
    50% {opacity:1;}
    100% {opacity:0.4;}
}
</style>
</head>

<body>

<div class="container">

<h1>HiddenEdge</h1>

<input type="file" id="files"><br><br>

<textarea id="job" placeholder="Paste job description"></textarea>

<br>
<button onclick="analyze()">Analyze</button>

<div id="analyzeHint">⏳ Analyzing…</div>

<!-- PAYWALL -->
<div id="paywall">
    <h2>Unlock Full Access</h2>
    <p>You’ve used your 3 free analyses.</p>
    <button onclick="pay()">Unlock (€9)</button>
</div>

<!-- RESULTS -->
<div id="resultBox" style="display:none;">
    <div class="card">
        <h2 id="decision"></h2>
        <h3 id="score"></h3>
        <p id="recruiter"></p>
        <p id="manager"></p>
    </div>
</div>

</div>

<script>

function getAttempts(){
    return parseInt(localStorage.getItem("attempts") || "0");
}

function isPaid(){
    return localStorage.getItem("paid") === "true";
}

async function analyze(){

    const attempts = getAttempts();
    const paid = isPaid();

    // 🔥 HARD PAYWALL STOP
    if(!paid && attempts >= 3){
        document.getElementById("paywall").style.display = "block";
        document.getElementById("resultBox").style.display = "none";
        return;
    }

    document.getElementById("paywall").style.display = "none";
    document.getElementById("analyzeHint").style.display = "block";

    const file = document.getElementById("files").files[0];
    const job = document.getElementById("job").value;

    const fd = new FormData();
    fd.append("file", file);
    fd.append("job", job);

    const res = await fetch("/analyze?ts=" + Date.now(), {
        method:"POST",
        body:fd
    });

    const data = await res.json();

    // increment AFTER successful call
    if(!paid){
        localStorage.setItem("attempts", attempts + 1);
    }

    document.getElementById("decision").innerText = data.nestor.decision;
    document.getElementById("score").innerText = "Score: " + data.nestor.fit_score;
    document.getElementById("recruiter").innerText = data.nestor.recruiter_view;
    document.getElementById("manager").innerText = data.nestor.hiring_manager_view;

    document.getElementById("resultBox").style.display = "block";
    document.getElementById("analyzeHint").style.display = "none";
}

function pay(){
    window.location.href = "/create-checkout-session";
}

// Stripe return
const params = new URLSearchParams(window.location.search);
if(params.get("paid") === "true"){
    localStorage.setItem("paid", "true");
    localStorage.setItem("attempts", "0");
    document.getElementById("paywall").style.display = "none";
}

</script>

</body>
</html>
