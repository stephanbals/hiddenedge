<script>
let email = localStorage.getItem("email");

function analyze() {

    if (!email) {
        alert("Missing email. Go back and enter email.");
        return;
    }

    let file = document.getElementById("file").files[0];
    let job = document.getElementById("job").value;

    let form = new FormData();
    form.append("file", file);
    form.append("job_text", job);
    form.append("email", email); // 🔥 FIX

    fetch("/analyze", {
        method: "POST",
        body: form
    })
    .then(r => r.json())
    .then(data => {
        console.log(data);

        if (data.error === "PAYWALL") {
            alert("Free limit reached. Please unlock.");
            return;
        }

        document.getElementById("output").value =
            "Score: " + data.nestor.fit_score + "\n" +
            "Decision: " + data.nestor.decision + "\n\n" +
            "Recruiter:\n" + data.nestor.recruiter_view + "\n\n" +
            "Hiring Manager:\n" + data.nestor.hiring_manager_view;
    });
}

function goToCheckout() {

    if (!email) {
        alert("Missing email.");
        return;
    }

    fetch("/create-checkout-session", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email: email }) // 🔥 FIX
    })
    .then(res => res.json())
    .then(data => {
        window.location.href = data.url;
    });
}
</script>
