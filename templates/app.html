<!DOCTYPE html>
<html>
<head>
<title>HiddenEdge</title>

<style>
body { background:#111; color:white; font-family:Arial; text-align:center; }
textarea { width:80%; height:120px; }
#resultBox { display:none; margin-top:30px; width:80%; margin:auto; text-align:left; }
pre { white-space:pre-wrap; background:#1c1c1c; padding:15px; }
button { padding:10px 20px; margin-top:15px; }
</style>
</head>

<body>

<h2>HiddenEdge</h2>

<input id="email"><br><br>
<input type="file" id="files"><br><br>
<textarea id="job"></textarea><br>

<button onclick="analyze()">Analyze</button>

<div id="resultBox">

<h3 id="decision"></h3>
<h4 id="score"></h4>

<p id="recruiter"></p>
<p id="manager"></p>

<div id="warning"></div>

<div id="gapSection" style="display:none;">
<h3>Key Gaps</h3>
<ul id="gaps"></ul>

<h3>Recommended Actions</h3>
<ul id="actions"></ul>
</div>

<button id="generateBtn" onclick="generateCV()">Generate CV</button>

<h3>Optimized CV</h3>
<pre id="alec"></pre>

<button onclick="downloadCV()">Download CV (.docx)</button>

</div>

<script>

let globalCV = "";
let globalJob = "";

async function analyze(){

    const file = document.getElementById("files").files[0];
    const job = document.getElementById("job").value;

    const fd = new FormData();
    fd.append("file", file);
    fd.append("job", job);

    const res = await fetch("/analyze", {method:"POST", body:fd});
    const data = await res.json();

    globalCV = data.cv_text;
    globalJob = data.job_text;

    const score = data.nestor.fit_score;
    const decision = data.nestor.decision;

    document.getElementById("decision").innerText = "Decision: " + decision;
    document.getElementById("score").innerText = "Score: " + score;

    document.getElementById("recruiter").innerText = data.nestor.recruiter_view;
    document.getElementById("manager").innerText = data.nestor.hiring_manager_view;

    let warning = "";

    if(score < 50){
        warning = "⚠️ Low match — generating CV may reduce success chances.";
        document.getElementById("generateBtn").innerText = "Generate CV anyway";
    }
    else if(score < 70){
        warning = "⚠️ Partial match — gaps identified below.";
    }
    else{
        warning = "✅ Strong match.";
    }

    document.getElementById("warning").innerText = warning;

    // GAPS
    const gaps = data.gaps || [];
    const actions = data.actions || [];

    if(gaps.length > 0){
        const g = document.getElementById("gaps");
        const a = document.getElementById("actions");

        g.innerHTML = "";
        a.innerHTML = "";

        gaps.forEach(x => {
            const li = document.createElement("li");
            li.innerText = x;
            g.appendChild(li);
        });

        actions.forEach(x => {
            const li = document.createElement("li");
            li.innerText = x;
            a.appendChild(li);
        });

        document.getElementById("gapSection").style.display = "block";
    }

    document.getElementById("resultBox").style.display = "block";
}

async function generateCV(){

    const res = await fetch("/alec", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            cv_text: globalCV,
            job_text: globalJob
        })
    });

    const data = await res.json();
    document.getElementById("alec").innerText = data.alec_cv;
}

async function downloadCV(){

    const cv = document.getElementById("alec").innerText;

    const res = await fetch("/download_cv", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({cv})
    });

    const blob = await res.blob();
    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "HiddenEdge_CV.docx";
    a.click();
}

</script>

</body>
</html>
