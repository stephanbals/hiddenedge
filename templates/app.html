<!DOCTYPE html>
<html>
<head>
<title>HiddenEdge</title>
</head>

<body>

<h2>HiddenEdge</h2>

<input type="file" id="file">
<textarea id="job" placeholder="Paste job description"></textarea>

<button onclick="analyze()">Analyze</button>
<button onclick="generateCV()">Generate CV</button>
<button onclick="pay()">Unlock</button>

<div id="dashboard" style="display:none;">
    <div id="decision"></div>
    <div id="recruiter"></div>
    <div id="manager"></div>
</div>

<script>

let email = localStorage.getItem("email");
if (!email) window.location.href = "/email";

function analyze() {

    let file = document.getElementById("file").files[0];
    let job = document.getElementById("job").value;

    let form = new FormData();
    form.append("file", file);
    form.append("job_text", job);
    form.append("email", email);

    fetch("/analyze", {
        method: "POST",
        body: form
    })
    .then(async r => {

        if (!r.ok) {
            let err = await r.text();
            console.error(err);
            alert("Analysis failed");
            return;
        }

        let data = await r.json();

        if (!data.nestor) {
            console.error(data);
            alert("Invalid response");
            return;
        }

        document.getElementById("dashboard").style.display = "block";

        document.getElementById("decision").innerText =
            data.nestor.decision + " (" + data.nestor.fit_score + "%)";

        document.getElementById("recruiter").innerText =
            data.nestor.recruiter_view;

        document.getElementById("manager").innerText =
            data.nestor.hiring_manager_view;
    });
}

function generateCV() {
    alert("CV generation test later");
}

function pay() {
    fetch("/create-checkout-session", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({email:email})
    })
    .then(r=>r.json())
    .then(data=>{
        window.location.href=data.url;
    });
}

</script>

</body>
</html>
