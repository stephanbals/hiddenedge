<!DOCTYPE html>
<html>
<head>
<title>HiddenEdge</title>

<style>
body {
    margin:0;
    font-family:Arial;
    color:white;
    background: radial-gradient(circle at top, #140a2e, #050010);
    text-align:center;
}

.container {
    padding:40px 20px;
}

textarea {
    width:80%;
    height:160px;
    margin-top:10px;
    border-radius:10px;
    border:none;
    padding:10px;
}

input[type="file"] {
    margin-top:20px;
}

button {
    margin-top:20px;
    padding:14px 40px;
    font-size:18px;
    background:#4ea3ff;
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
    box-shadow:0 0 15px #4ea3ff;
}

.card {
    margin:40px auto;
    width:80%;
    padding:25px;
    border-radius:20px;
    background: rgba(255,255,255,0.05);
    text-align:left;
}

.hidden {
    display:none;
}
</style>
</head>

<body>

<div class="container">

<h1>HiddenEdge</h1>

<!-- STEP 1 -->
<div class="card">
    <h2>1. Upload your CV</h2>
    <input type="file" id="files" multiple>
</div>

<!-- STEP 2 -->
<div class="card">
    <h2>2. Paste Job Description</h2>
    <textarea id="job"></textarea>
</div>

<button id="analyzeBtn" onclick="analyze()">Analyze</button>

<!-- NESTOR OUTPUT -->
<div id="analysisBox" class="card hidden">
    <h2>🧠 Nestor Analysis</h2>
    <p id="decision"></p>
    <p id="score"></p>

    <h3>Gaps</h3>
    <ul id="gaps"></ul>

    <button onclick="goToPayment()" style="background:#00c853;">
        Improve My CV
    </button>
</div>

<!-- ALEC OUTPUT -->
<div id="cvBox" class="card hidden">
    <h2>⚡ Alec Optimized CV</h2>
    <textarea id="cv"></textarea>
    <button onclick="download()">Download CV</button>
</div>

</div>

<script>

let email = localStorage.getItem("email");
let files = [];
let job = "";

// 🔒 Ensure email exists
if (!email) {
    email = prompt("Enter your email:");
    if (email) {
        localStorage.setItem("email", email);
    } else {
        alert("Email is required.");
    }
}


// ANALYZE
async function analyze() {

    email = localStorage.getItem("email");
    job = document.getElementById("job").value;
    files = document.getElementById("files").files;

    if (!email) {
        alert("Missing email. Go back and start again.");
        return;
    }

    if (!job || files.length === 0) {
        alert("Upload CV and paste job description.");
        return;
    }

    document.getElementById("analyzeBtn").innerText = "Analyzing...";

    let formData = new FormData();
    formData.append("email", email);
    formData.append("job", job);

    for (let i = 0; i < files.length; i++) {
        formData.append("files", files[i]);
    }

    try {

        const res = await fetch("/analyze", {
            method: "POST",
            body: formData
        });

        const data = await res.json();
        const a = data.nestor;

        document.getElementById("analysisBox").classList.remove("hidden");
        document.getElementById("decision").innerText = "Decision: " + a.decision;
        document.getElementById("score").innerText = "Fit Score: " + a.fit_score;

        let gapsList = document.getElementById("gaps");
        gapsList.innerHTML = "";

        (a.gaps || []).forEach(g => {
            let li = document.createElement("li");
            li.innerText = g;
            gapsList.appendChild(li);
        });

        // Scroll to analysis
        document.getElementById("analysisBox").scrollIntoView({behavior:"smooth"});

    } catch (err) {
        alert("Analysis failed. Try again.");
    }

    document.getElementById("analyzeBtn").innerText = "Analyze";
}


// STRIPE CHECKOUT
async function goToPayment() {

    try {
        const res = await fetch("/create_checkout", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: email
            })
        });

        const data = await res.json();

        if (data.url) {
            window.location.href = data.url;
        } else {
            alert("Payment session failed");
        }

    } catch (err) {
        alert("Error connecting to payment.");
    }
}


// GENERATE CV AFTER PAYMENT
async function generateCV() {

    const params = new URLSearchParams(window.location.search);
    const paid = params.get("paid") === "true";

    if (!paid) return;

    if (!email) {
        alert("Session lost. Please start again.");
        return;
    }

    try {

        const res = await fetch("/regenerate", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: email
            })
        });

        const data = await res.json();

        if (data.paywall) {
            alert("Please complete payment first.");
            return;
        }

        if (!data.cv) {
            alert("CV generation failed.");
            return;
        }

        document.getElementById("cvBox").classList.remove("hidden");
        document.getElementById("cv").value = data.cv;

    } catch (err) {
        alert("Error generating CV.");
    }
}


// DOWNLOAD CV
async function download() {

    let cv = document.getElementById("cv").value;

    try {

        const res = await fetch("/download_cv", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                cv: cv,
                template: "default"
            })
        });

        const blob = await res.blob();

        let url = window.URL.createObjectURL(blob);
        let a = document.createElement("a");
        a.href = url;
        a.download = "HiddenEdge_CV.docx";
        a.click();

    } catch (err) {
        alert("Download failed.");
    }
}


// AUTO RUN AFTER PAYMENT RETURN
generateCV();

</script>

</body>
</html>
