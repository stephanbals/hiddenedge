<!DOCTYPE html>
<html>
<head>
<title>HiddenEdge</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}

textarea {
    width: 80%;
    height: 120px;
}

button {
    padding: 10px 20px;
    margin-top: 20px;
    cursor: pointer;
}
</style>

</head>

<body>

<h2>Email</h2>
<input id="email"><br><br>

<h2>Upload CV</h2>
<input type="file" id="files"><br><br>

<h2>Job Description</h2>
<textarea id="job"></textarea><br>

<button type="button" onclick="analyze()">Analyze</button>

<div id="result"></div>

<script>

// preload email
document.getElementById("email").value =
    localStorage.getItem("email") || "";

async function analyze(){

    console.log("ANALYZE CLICKED");

    const email = document.getElementById("email").value;
    const job = document.getElementById("job").value;
    const files = document.getElementById("files").files;

    if(!email || files.length === 0 || !job){
        alert("Fill all fields");
        return;
    }

    localStorage.setItem("email", email);

    let fd = new FormData();
    fd.append("email", email);
    fd.append("job", job);
    fd.append("files", files[0]);

    try {

        console.log("SENDING REQUEST...");

        const res = await fetch("https://hiddenedge-live.onrender.com/analyze", {
            method: "POST",
            body: fd
        });

        console.log("STATUS:", res.status);

        const text = await res.text();
        console.log("RAW RESPONSE:", text);

        let data;
        try {
            data = JSON.parse(text);
        } catch(e) {
            alert("Server returned non-JSON (check logs)");
            return;
        }

        document.getElementById("result").innerHTML =
            "Decision: " + data.decision +
            "<br>Score: " + data.fit_score +
            "<br><button type='button' onclick='pay()'>Improve CV</button>";

    } catch(err){
        console.error("FETCH ERROR:", err);
        alert("Analyze failed — network/backend issue");
    }
}

async function pay(){

    const email = document.getElementById("email").value;

    const res = await fetch("https://hiddenedge-live.onrender.com/create_checkout", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({email})
    });

    const data = await res.json();

    window.location.href = data.url;
}

</script>

</body>
</html>
