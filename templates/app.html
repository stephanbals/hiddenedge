<!DOCTYPE html>
<html>
<head>
<title>HiddenEdge</title>

<style>
body {
    font-family:Arial;
    background:#0b1b3a;
    color:white;
}
.container {
    width:1100px;
    margin:auto;
}
.card {
    background:#132a5e;
    padding:20px;
    margin:20px 0;
    border-radius:10px;
}
textarea {
    width:100%;
    height:220px;
    background:#020a1f;
    color:white;
    border:1px solid #1e4fff;
    padding:10px;
}
button {
    padding:10px;
    margin-top:10px;
    cursor:pointer;
}
.split {
    display:flex;
    gap:20px;
}
.box {
    width:50%;
}
.title {
    font-size:22px;
    margin-bottom:10px;
}
.sub {
    color:#9bbcff;
}
.highlight {
    background:#1f3c88;
    padding:10px;
    border-radius:6px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- INPUT -->
<div class="card">
<div class="title">Start Analysis</div>

<input id="email" placeholder="Enter your email"><br><br>
<input type="file" id="cv"><br><br>

<textarea id="job" placeholder="Paste job description"></textarea>

<button onclick="run()">Analyze</button>
</div>

<!-- NESTOR -->
<div class="card">
<div class="title">🤖 Nestor — Should You Apply?</div>

<div id="decision"></div>

<div id="analysis"></div>
</div>

<!-- ALEC -->
<div class="card">
<div class="title">🛠 Alec — CV Optimization</div>

<div class="split">

<div class="box">
<h3>Original CV</h3>
<textarea id="cv_original" readonly></textarea>
</div>

<div class="box">
<h3>Improved CV</h3>
<textarea id="cv_out"></textarea>
</div>

</div>

<button onclick="download()">Download CV</button>
</div>

</div>

<script>

function getEmail(){
    let email=document.getElementById("email").value;
    if(!email){
        alert("Enter email first");
        throw new Error("no email");
    }
    return email;
}

async function run(){

    const email=getEmail();
    const file=document.getElementById("cv").files[0];
    const job=document.getElementById("job").value;

    const fd=new FormData();
    fd.append("email",email);
    fd.append("job",job);
    fd.append("files",file);

    const res=await fetch("/analyze",{method:"POST",body:fd});
    const data=await res.json();

    // DECISION
    document.getElementById("decision").innerHTML =
        `<div class="highlight">${data.nestor.decision} (${data.nestor.fit_score}/10)</div>`;

    // ANALYSIS
    const n=data.nestor;

    let html = `
    <div class="sub">Match Breakdown</div>

    <b>Strengths:</b><br>${n.strengths.join("<br>")}<br><br>

    <b>Gaps:</b><br>${n.gaps.join("<br>")}<br><br>

    <b>Risks:</b><br>${n.risk_flags.join("<br>")}<br><br>

    <b>Domain:</b><br>${n.domain_analysis}<br><br>

    <b>Score Breakdown:</b><br>
    Skills: ${n.heatmap.skills}%<br>
    Experience: ${n.heatmap.experience}%<br>
    Tools: ${n.heatmap.tools}%<br>
    Domain: ${n.heatmap.domain}%<br>
    Seniority: ${n.heatmap.seniority}%<br>
    `;

    document.getElementById("analysis").innerHTML = html;

    // FIXED ORIGINAL DISPLAY (NO BINARY)
    document.getElementById("cv_original").value =
        "CV processed successfully";

    document.getElementById("cv_out").value = data.alec.cv;
}

async function download(){

    const cv=document.getElementById("cv_out").value;

    const res=await fetch("/download_cv",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({cv:cv})
    });

    const blob=await res.blob();
    const url=URL.createObjectURL(blob);

    let a=document.createElement("a");
    a.href=url;
    a.download="cv.docx";
    a.click();
}

</script>

</body>
</html>
