<!DOCTYPE html>
<html>
<head>
    <title>HiddenEdge</title>
    <style>
        body { font-family: Arial; margin: 30px; }

        textarea {
            width: 100%;
            height: 180px;
            margin-top: 10px;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            cursor: pointer;
        }

        .hidden { display: none; }

        #paywall {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 999;
        }
    </style>
</head>
<body>

<h2>HiddenEdge</h2>

<input type="file" id="file">
<textarea id="job" placeholder="Paste job description"></textarea>

<button onclick="analyze()">Analyze</button>
<button onclick="generateCV()">Generate CV</button>
<button onclick="downloadCV()">Download CV</button>

<h3>Result</h3>
<textarea id="output"></textarea>

<!-- PAYWALL -->
<div id="paywall" class="hidden">
    <h2>Unlock Full Access</h2>
    <p>You’ve used your 3 free analyses.</p>
    <button onclick="goToCheckout()">Unlock Now</button>
</div>

<script>
let BASE_URL = "";

// ===============================
// INIT STATE
// ===============================
let attempts = parseInt(localStorage.getItem("attempts") || "0");
let paid = localStorage.getItem("paid") === "true";

// Handle Stripe return
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get("paid") === "true") {
    localStorage.setItem("paid", "true");
    localStorage.setItem("attempts", "0");
    paid = true;
    attempts = 0;
    window.history.replaceState({}, document.title, "/app");
}

// ===============================
// PAYWALL CONTROL
// ===============================
function checkPaywall() {
    if (!paid && attempts >= 3) {
        document.getElementById("paywall").classList.remove("hidden");
        return true;
    }
    return false;
}

// ===============================
// ANALYZE (NESTOR)
// ===============================
function analyze() {

    // HARD BLOCK BEFORE ANY CALL
    if (checkPaywall()) return;

    let file = document.getElementById("file").files[0];
    let job = document.getElementById("job").value;

    if (!file || !job) {
        alert("Upload CV and paste job description");
        return;
    }

    let form = new FormData();
    form.append("file", file);
    form.append("job_text", job);

    fetch(BASE_URL + "/analyze", {
        method: "POST",
        body: form
    })
    .then(r => {
        if (!r.ok) throw new Error("Server error");
        return r.json();
    })
    .then(data => {

        document.getElementById("output").value = data.result || "";

        // Increment ONLY if not paid
        if (!paid) {
            attempts++;
            localStorage.setItem("attempts", attempts);
        }

        // Check AFTER increment
        checkPaywall();
    })
    .catch(err => {
        alert("Error: " + err.message);
    });
}

// ===============================
// CV GENERATION (ALEC)
// ===============================
function generateCV() {

    if (checkPaywall()) return;

    let file = document.getElementById("file").files[0];
    let job = document.getElementById("job").value;

    if (!file || !job) {
        alert("Upload CV and paste job description");
        return;
    }

    let form = new FormData();
    form.append("file", file);
    form.append("job_text", job);

    fetch(BASE_URL + "/alec", {
        method: "POST",
        body: form
    })
    .then(r => {
        if (!r.ok) throw new Error("Server error");
        return r.json();
    })
    .then(data => {
        document.getElementById("output").value = data.cv || "";
    })
    .catch(err => {
        alert("Error: " + err.message);
    });
}

// ===============================
// DOWNLOAD
// ===============================
function downloadCV() {

    let cv = document.getElementById("output").value;

    if (!cv) {
        alert("No CV generated");
        return;
    }

    fetch(BASE_URL + "/download_cv", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ cv: cv })
    })
    .then(res => res.blob())
    .then(blob => {
        let url = window.URL.createObjectURL(blob);
        let a = document.createElement("a");
        a.href = url;
        a.download = "Tailored_CV.docx";
        a.click();
    });
}

// ===============================
// STRIPE CHECKOUT
// ===============================
function goToCheckout() {

    fetch(BASE_URL + "/create-checkout-session", {
        method: "POST"
    })
    .then(res => res.json())
    .then(data => {
        window.location.href = data.url;
    });
}

// ===============================
// INITIAL CHECK
// ===============================
checkPaywall();

</script>

</body>
</html>
