<!DOCTYPE html>
<html>
<head>
    <title>HiddenEdge</title>
</head>
<body>

<h1>HiddenEdge</h1>

<input type="file" id="cvFile" accept=".txt,.docx"><br><br>

<textarea id="jobDescription" rows="10" cols="60" placeholder="Paste job description here..."></textarea><br><br>

<button onclick="analyze()">Analyze</button>
<button onclick="unlock()">Unlock</button>

<h2>Result</h2>

<div id="result">
    <p>Score: -</p>
    <p>Decision: -</p>
    <p><strong>Recruiter View:</strong></p>
    <pre id="recruiterView"></pre>
    <p><strong>Hiring Manager View:</strong></p>
    <pre id="hiringView"></pre>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>

<script>
let cvText = "";

document.getElementById("cvFile").addEventListener("change", async function(event) {
    const file = event.target.files[0];

    if (!file) return;

    if (file.name.endsWith(".docx")) {
        const arrayBuffer = await file.arrayBuffer();
        const result = await mammoth.extractRawText({ arrayBuffer: arrayBuffer });
        cvText = result.value;
    } else {
        cvText = await file.text();
    }

    console.log("CV extracted");
});

async function analyze() {
    const jobDescription = document.getElementById("jobDescription").value;

    if (!cvText) {
        alert("Please upload your CV first.");
        return;
    }

    const res = await fetch("/analyze", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            job_description: jobDescription,
            cv_text: cvText
        })
    });

    const data = await res.json();

    if (data.error === "PAYWALL") {
        alert("Free limit reached. Please unlock.");
        return;
    }

    document.getElementById("result").innerHTML = `
        <p>Score: ${data.fit_score}</p>
        <p>Decision: ${data.decision}</p>
        <p><strong>Recruiter View:</strong></p>
        <pre>${data.recruiter_view}</pre>
        <p><strong>Hiring Manager View:</strong></p>
        <pre>${data.hiring_manager_view}</pre>
    `;
}

async function unlock() {
    const res = await fetch("/create-checkout-session", {
        method: "POST"
    });

    const data = await res.json();
    window.location.href = data.url;
}
</script>

</body>
</html>
