<!DOCTYPE html>
<html>
<head>
    <title>HiddenEdge</title>
</head>
<body>

<h1>HiddenEdge</h1>

<input type="file" id="cvFile"><br><br>

<textarea id="jobDescription" rows="10" cols="60"></textarea><br><br>

<button onclick="analyze()">Analyze</button>

<h2>Result</h2>

<p>Score: <span id="score">-</span></p>
<p>Decision: <span id="decision">-</span></p>

<h3>Match Summary:</h3>
<p id="summary"></p>

<script>
let cvFile = null;

document.getElementById("cvFile").addEventListener("change", e => {
    cvFile = e.target.files[0];
});

function analyze() {
    const formData = new FormData();
    formData.append("cv_file", cvFile);
    formData.append("job_text", document.getElementById("jobDescription").value);

    fetch("/analyze", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("score").innerText = data.fit_score;
        document.getElementById("decision").innerText = data.decision;
        document.getElementById("summary").innerText = data.match_summary;
    });
}
</script>

</body>
</html>
